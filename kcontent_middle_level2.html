<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 내가 생각하는 최고의 K-콘텐츠는?</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">

    <style>
        /* --------------------------------------------------
         * [학생 커스터마이징 슬롯] 
         * 이곳의 색상테마와 분위기를 바꾸면 나만의 앱이 완성됩니다!
         * -------------------------------------------------- */
        :root {
            --primary-color: #ff4757;       /* 메인 강조 포인트 색상 */
            --primary-hover: #ff6b81;       /* 메인 버튼 호버 색상 */
            --bg-color: #f1f2f6;            /* 전체 배경 색상 */
            --card-bg: #ffffff;             /* 카드 내부 배경 색상 */
            --text-dark: #2f3542;           /* 기본 글자 색상 */
            --text-muted: #747d8c;          /* 부연 설명 글자 색상 */
            --border-color: #e5e5e5;        /* 테두리 선 색상 */
            --chip-bg: #ffeaa7;             /* 해시태그 칩 배경 색상 */
            --chip-text: #d63031;           /* 해시태그 칩 글자 색상 */
        }

        /* [모바일 안전 세트 2] 최소 CSS 및 전체 기본화면 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            max-width: 100%;
            overflow-x: hidden; /* 가로 스크롤 절대 방지 */
            word-break: keep-all; /* 한글 단어 단위 줄바꿈 */
            font-family: 'Gowun Dodum', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            letter-spacing: -0.2px;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 🚨🚨 [카드 박스 절대 고정 규칙] - 크기 및 패딩 절대 고정 */
        .app-card {
            width: 100%;
            max-width: 420px;
            height: 580px;                  /* 🚨 모든 화면 동일 */
            padding: 24px 20px;             /* 🚨 모든 화면 동일 */
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin: 0 auto;
            background: var(--card-bg);
            position: relative;             /* 좌상단 이전 버튼 위치 기준 */
            overflow-x: hidden;             /* 🚨 가로 스크롤 무조건 차단 */
            overflow-y: auto;               /* 🚨 세로 스크롤은 가능하되 스크롤바만 숨김 */
            scrollbar-width: none;          /* Firefox: 스크롤바 숨김 */
            -ms-overflow-style: none;       /* IE/Edge(구버전): 스크롤바 숨김 */
            display: flex;                  /* 내부 화면 정렬용 */
            flex-direction: column;
        }

        .app-card::-webkit-scrollbar {
            display: none;                  /* Chrome / Safari / Edge: 스크롤바 숨김 */
            width: 0;
            height: 0;
        }

        /* 🚨 [flex 레이아웃] 화면별 공통 베이스 설정 */
        #start-screen, #question-screen, #result-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }

        /* 시작화면, 질문화면 요소 간격 */
        #start-screen, #question-screen {
            gap: 14px;
        }

        /* 결과 화면은 콘텐츠가 많으므로 간격을 살짝 좁게 조절 (요구사항 반영) */
        #result-screen {
            gap: 12px;
        }

        /* 🚨 [버튼 뭉개짐 방지 규칙] 및 메인 버튼 하단 정착 */
        .main-btn {
            width: 100%;
            min-height: 52px;               /* 🚨 height 대신 min-height 사용 */
            flex-shrink: 0;                 /* 🚨 절대 줄어들지 않게 함 */
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;               /* 🚨 카드 하단에 자연스럽게 정착 */
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
        }

        /* 호버 시 .app-card 영역을 넘지 않도록 미세 효과만 허용 */
        .main-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* 이전 버튼 (좌상단 화살표 원형 버튼) */
        .back-btn {
            width: 36px;
            height: 36px;
            flex-shrink: 0; /* 뭉개짐 방지 */
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: #ffffff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 10;
        }

        /* 진행률 영역 스타일 */
        .progress-area {
            margin-top: 24px; /* 이전 버튼 공간 확보 */
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .progress-text {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: bold;
        }
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        /* 질문 텍스트 */
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* 🚨 선택지 컨테이너 - 다닥다닥 붙지 않게 gap 필수 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 🚨 선택지 카드 스타일 및 모바일 안전 라디오 매핑 그룹화 */
        .option-card {
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background-color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            flex-shrink: 0;
            transition: background-color 0.2s, border-color 0.2s;
        }
        /* scale 대신 크기 변형 없는 선 테두리 및 배경색 변경 권장 규칙 준수 */
        .option-card:hover {
            border-color: var(--primary-color);
            background-color: #fff5f5;
        }
        .option-card input[type="radio"] {
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        /* 시작화면 전용 스타일 구성 */
        .title-area {
            text-align: center;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .title-area h1 {
            font-size: 24px;
            font-weight: bold;
        }
        .title-area p {
            font-size: 15px;
            color: var(--text-muted);
        }

        /* 결과화면 전용 스타일 및 박스 모델 */
        .result-title {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
        }
        .result-emoji {
            font-size: 90px; /* 80~100px 범위 최적화 */
            text-align: center;
            line-height: 1;
        }
        .result-name {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
        }
        /* ⑤, ⑥번 회색 박스 설정 */
        .gray-box {
            background-color: #f5f6fa;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
        }
        /* ⑦번 강점 키워드 해시태그 칩 정렬 컨테이너 */
        .keywords-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin: 4px 0;
        }
        .keyword-chip {
            background-color: var(--chip-bg);
            color: var(--chip-text);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
        /* ⑧번 💡 실천제안 강조 박스 설정 (노란/연두 배경 + 테두리) */
        .suggestion-box {
            background-color: #e6ffed;
            border: 2px dashed #28a745;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* 0.25초 좌우 슬라이드 화면 전환 효과 스타일 */
        .slide-fade {
            animation: slideFadeIn 0.25s ease-out forwards;
        }
        @keyframes slideFadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 하단 푸터 스타일 */
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-card">
        
        <div id="start-screen">
            <div class="title-area">
                <h1>🎤 내가 생각하는 최고의 K-콘텐츠는?</h1>
                <p>나는 어떤 K-콘텐츠에 가장 끌릴까요? 아래의 질문에 답하고 나의 K-콘텐츠 취향을 알아보아요!</p>
            </div>
            <button class="main-btn" onclick="startQuiz()">🚀 나의 K-콘텐츠 취향 알아보기</button>
        </div>

        <div id="question-screen" style="display: none;">
            <button id="btn-back" class="back-btn" onclick="prevQuestion()">⬅️</button>
            
            <div class="progress-area">
                <span id="progress-text" class="progress-text">Q1/6</span>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <div id="question-text" class="question-text"></div>
            
            <form id="quiz-form">
                <div id="options-container" class="options">
                    </div>
            </form>

            <button id="btn-next" class="main-btn" onclick="nextQuestion()">다음 질문으로 ➡️</button>
        </div>

        <div id="result-screen" style="display: none;">
            <h2 class="result-title">📊 나의 K-콘텐츠 취향 결과</h2>
            
            <div id="res-emoji" class="result-emoji"></div>
            
            <div id="res-type-name" class="result-name"></div>
            
            <div class="gray-box">
                <strong>어떤 스타일일까?:</strong> <span id="res-style"></span>
            </div>
            
            <div class="gray-box">
                <strong>추천:</strong> <span id="res-recommend"></span>
            </div>
            
            <div id="res-keywords" class="keywords-container"></div>
            
            <div class="suggestion-box">
                <strong>💡 실천제안:</strong> <br><span id="res-suggestion"></span>
            </div>
            
            <button class="main-btn" onclick="resetQuiz()">🔄 다시 하기</button>
        </div>

    </div>

    <footer>
        <p>AI의 도움을 받아 제작된 콘텐츠입니다.</p>
    </footer>

    <script>
        // 현재 위치해 있는 질문 방 번호 (0 = Q1, 1 = Q2 ...)
        let currentIdx = 0;
        // 학생들이 선택한 라디오 버튼 답안을 저장해둘 배열 창고
        let userAnswers = [null, null, null, null, null, null];

        /* [🚨 절대 변경 금지 - 질문 데이터 보존 규칙] */
        const QUESTIONS = [
            {
                q: "Q1. 내가 가장 먼저 소개하고 싶은 K-콘텐츠 공간은?",

                ]
            },
            {
                q: "Q3. 내가 더 참기 힘든 것은?",
                options: [
                    "① 야식 사진 안 보기 🍗",

                    "③ 드라마 스포일러 당하기 😭",
                    "④ 최애 캐릭터 굿즈 놓치기 🎀"
                ]
            },
            {
                q: "Q4. 친구와 서울 여행을 간다면 나는?",
                options: [
                    "① \"여기 유명한 먹거리 거리래!\" 🍡",
                    "② \"여기 공연이 열리는 곳이래!\" 🎤",
                    "③ \"여기 드라마 촬영지래!\" 📸",
                    "④ \"여기 캐릭터 팝업이 열린대!\" 🎮"
                ]
            },
            {

                    "② 무대 영상과 챌린지 몰아보기 🎵",
                    "③ 드라마 정주행 🎬",
                    "④ 웹툰·게임 하루 종일 즐기기 🕹️"
                ]
            },
            {
                q: "Q6. 더 갖고 싶은 굿즈는?",
                options: [
                    "① 유명 맛집 한정 디저트 🍪",
                    "② 최애 아이돌 응원봉 🎤",

                ]
            }
        ];

        /* [🚨 절대 변경 금지 - SUGGESTIONS 20개 실천제안 객체 풀] */
        const SUGGESTIONS = {
          "K-푸드 탐험형": [

            "지역별 K-푸드(전주·부산·광장시장)를 비교하는 콘텐츠를 만들어 보세요!",
            "외국 친구에게 추천할 K-푸드 5선을 영어 메뉴로 정리해 보세요!",
          ],
          "K-POP 에너지형": [
            "최애 아이돌 무대 영상을 보고 댄스 챌린지를 따라 해 보세요!",
            "친구들과 K-POP 플레이리스트를 공유하는 챌린지를 열어 보세요!",
            "내가 좋아하는 아이돌의 의상·무대 컨셉을 분석해 정리해 보세요!",
            "K-POP 콘서트·체험관 영상을 보고 '꼭 가보고 싶은 무대'를 골라 보세요!",
            "친구들과 무대 영상 리액션 콘텐츠를 만들어 SNS에 공유해 보세요!",
          ],
          "K-드라마 감성형": [
            "최근 본 K-드라마 OST를 모아 나만의 감성 플레이리스트를 만들어 보세요!",

            "드라마 촬영지(남산·한강) 중 한 곳을 골라 미니 여행 코스를 짜 보세요!",

          ],
          "K-캐릭터 몰입형": [
            "내가 좋아하는 K-캐릭터를 활용해 굿즈 디자인 아이디어를 그려 보세요!",
            "주말 하루를 정해 웹툰·게임 정주행 챌린지에 도전해 보세요!",
            "K-캐릭터 팝업스토어 정보를 정리해 친구와 함께 방문 계획을 세워 보세요!",
            "내가 좋아하는 게임의 세계관을 친구에게 설명하는 콘텐츠를 만들어 보세요!",
            "캐릭터 코스튬·페어 행사를 조사해 위시리스트로 정리해 보세요!",
          ],
        };

        /* [🚨 절대 변경 금지 - 랜덤 추출 알고리즘 로직 보존] 
           학습 포인트: 객체 키에 대응하는 배열 크기만큼 랜덤 소수를 곱하고 소수점을 버립니다. */
        function getRandomSuggestion(type) {
          const list = SUGGESTIONS[type];
          const idx = Math.floor(Math.random() * list.length);
          return list[idx];
        }

        /* [🚨 절대 변경 금지 - 결과 데이터 유형 한 글자도 변경 금지] */
        const RESULT_DATA = {
            "K-푸드 탐험형": {
                emoji: "🍜",
                style: "맛있는 음식과 시장 분위기를 좋아하는 타입입니다.",
                recommend: "먹방, 길거리 음식, 디저트 투어, 광장시장, 전주 한옥마을, 부산 먹거리 거리",
                keywords: ["#먹방", "#한식", "#시장", "#맛집"]
            },
            "K-POP 에너지형": {
                emoji: "🎤",
                style: "신나는 음악과 화려한 무대 분위기를 좋아하는 타입입니다.",
                recommend: "아이돌, 콘서트, 댄스 챌린지, 홍대 공연 거리, K-POP 체험관",
                keywords: ["#KPOP", "#댄스", "#무대", "#에너지"]
            },
            "K-드라마 감성형": {
                emoji: "🎬",
                style: "분위기 있는 장소와 감성적인 이야기를 좋아하는 타입입니다.",
                recommend: "드라마, 영화, OST, 한강공원, 남산, 드라마 촬영지",
                keywords: ["#감성", "#드라마", "#풍경", "#스토리"]
            },
            "K-캐릭터 몰입형": {
                emoji: "🎮",
                style: "웹툰, 게임, 캐릭터처럼 몰입감 있는 콘텐츠를 좋아하는 타입입니다.",
                recommend: "웹툰, 게임, 캐릭터 굿즈, 캐릭터 팝업스토어, 게임 박람회",
                keywords: ["#게임", "#웹툰", "#캐릭터", "#굿즈"]
            }
        };

        // 앱 시작 함수
        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            currentIdx = 0;
            renderQuestion();
        }

        // [SPA 화면 전환 교체 핵심 함수] - 질문 그리기 및 슬라이드 효과 부여
        function renderQuestion() {
            const screen = document.getElementById('question-screen');
            screen.classList.remove('slide-fade');
            void screen.offsetWidth; // 브라우저가 애니메이션 리플로우를 강제 인식하게 유도함
            screen.classList.add('slide-fade');

            const currentQ = QUESTIONS[currentIdx];
            
            // 상단 진행률 영역 텍스트 및 바 렌더링
            document.getElementById('progress-text').innerText = `Q${currentIdx + 1}/6`;
            const progressPercent = ((currentIdx + 1) / 6) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            // Q1일 때는 이전버튼 감추고 그 외엔 보이게 설정 (visibility 처리 요건)
            if (currentIdx === 0) {
                document.getElementById('btn-back').style.visibility = 'hidden';
            } else {
                document.getElementById('btn-back').style.visibility = 'visible';
            }

            // 질문 및 선택지 텍스트 맵핑
            document.getElementById('question-text').innerText = currentQ.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // 이전 목록 초기화

            currentQ.options.forEach((opt, idx) => {
                const optValue = idx + 1;
                
                // 선택지 카드를 라벨과 결합하여 동적 생성
                const card = document.createElement('label');
                card.className = 'option-card';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'kContentQuiz'; // 4지선다 라디오 하나의 이름으로 통합 그룹화
                radio.value = optValue;
                
                // 만약 이전에 임시 저장해둔 선택값이 있다면 화면에 다시 체크 표시 해둠
                if (userAnswers[currentIdx] == optValue) {
                    radio.checked = true;
                }

                // 카드 클릭 시 내부 라디오 선택 연동
                card.appendChild(radio);
                card.appendChild(document.createTextNode(opt));
                optionsContainer.appendChild(card);
            });

            // 🚨 버튼 라벨 고정 스위칭 처리 규칙
            const nextBtn = document.getElementById('btn-next');
            if (currentIdx === 5) {
                nextBtn.innerText = "📊 나의 K-콘텐츠 취향 알아보기";
            } else {
                nextBtn.innerText = "다음 질문으로 ➡️";
            }
        }

        // 다음 질문 버튼 클릭 동작 제어
        function nextQuestion() {
            const selected = document.querySelector('input[name="kContentQuiz"]:checked');
            
            // 미응답 유효성 체크 예외 차단
            if (!selected) {
                alert("답변을 선택해 주세요.");
                return;
            }

            // 학생의 소중한 답변을 배열에 보관
            userAnswers[currentIdx] = parseInt(selected.value);

            if (currentIdx < 5) {
                currentIdx++;
                renderQuestion();
            } else {
                // 마지막 6번째 문제까지 정상 완료 시 결과 산출로 이동
                calculateResult();
            }
        }

        // 이전 질문 돌아가기 버튼 기능 구현
        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        /* [🚨 절대 변경 금지 - 점수 계산 및 동점자 우선순위 로직] */
        function calculateResult() {
            let scores = {
                "K-푸드 탐험형": 0,
                "K-POP 에너지형": 0,
                "K-드라마 감성형": 0,
                "K-캐릭터 몰입형": 0
            };

            // 저장된 모든 응답 점수를 카운팅 매핑
            userAnswers.forEach(ans => {
                if (ans === 1) scores["K-푸드 탐험형"]++;
                else if (ans === 2) scores["K-POP 에너지형"]++;
                else if (ans === 3) scores["K-드라마 감성형"]++;
                else if (ans === 4) scores["K-캐릭터 몰입형"]++;
            });

            // 동점 발생 시 ①->②->③->④ 순서 우선 기준 고정배열 생성
            const typeOrder = ["K-푸드 탐험형", "K-POP 에너지형", "K-드라마 감성형", "K-캐릭터 몰입형"];
            let highestType = typeOrder[0];
            let maxScore = scores[highestType];

            for (let i = 1; i < typeOrder.length; i++) {
                const currentType = typeOrder[i];
                if (scores[currentType] > maxScore) {
                    maxScore = scores[currentType];
                    highestType = currentType;
                }
            }

            // 결과 노출 컴포넌트 데이터 주입 활성화
            const result = RESULT_DATA[highestType];
            
            document.getElementById('res-emoji').innerText = result.emoji;
            document.getElementById('res-type-name').innerText = highestType;
            document.getElementById('res-style').innerText = result.style;
            document.getElementById('res-recommend').innerText = result.recommend;
            
            // ⑦ 강점 키워드 개별 해시태그 칩으로 쪼개서 추가 출력 처리
            const keywordsContainer = document.getElementById('res-keywords');
            keywordsContainer.innerHTML = '';
            result.keywords.forEach(kw => {
                const chip = document.createElement('span');
                chip.className = 'keyword-chip';
                chip.innerText = kw;
                keywordsContainer.appendChild(chip);
            });

            // ⑧번 실천제안 영역에 랜덤 데이터 주입 (다시 실행할 때마다 매번 다르게 가동)
            document.getElementById('res-suggestion').innerText = getRandomSuggestion(highestType);

            // 최종 화면 전환 토글
            document.getElementById('question-screen').style.display = 'none';
            
            const resScreen = document.getElementById('result-screen');
            resScreen.style.display = 'flex';
            resScreen.classList.add('slide-fade');
        }

        /* 🔄 새로고침 없는 내부 상태 초기화 함수 */
        function resetQuiz() {
            userAnswers = [null, null, null, null, null, null];
            currentIdx = 0;
            
            document.getElementById('result-screen').style.display = 'none';
            const startScreen = document.getElementById('start-screen');
            startScreen.style.display = 'flex';
            startScreen.classList.remove('slide-fade');
            void startScreen.offsetWidth;
            startScreen.classList.add('slide-fade');
        }
    </script>
</body>
</html>
