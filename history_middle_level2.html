<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏺 내가 끌리는 역사 감성 찾기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 리셋 및 모바일 안전 규칙 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f5f6f7;
            font-family: 'Gowun Dodum', sans-serif;
            line-height: 1.6;
            letter-spacing: -0.2px;
            word-break: keep-all;
            max-width: 100%;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 🚨 [절대 고정 규칙] 카드 박스 스타일 규격 준수 */
        .app-card {
            width: 100%;
            max-width: 420px;
            height: 580px;                  /* 모든 화면 동일 고정 */
            padding: 24px 20px;             /* 모든 화면 동일 고정 */
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin: 0 auto;
            background: #ffffff;
            position: relative;             /* 좌상단 이전 버튼 위치 기준 */
            overflow-x: hidden;             /* 가로 스크롤 무조건 차단 */
            overflow-y: auto;               /* 세로 스크롤 가능, 스크롤바 숨김 */
            scrollbar-width: none;          /* Firefox 스크롤바 숨김 */
            -ms-overflow-style: none;       /* IE/Edge 스크롤바 숨김 */
            display: flex;                  /* 내부 화면 정렬용 */
            flex-direction: column;
        }
        .app-card::-webkit-scrollbar {
            display: none;                  /* Chrome/Safari/Edge 스크롤바 숨김 */
            width: 0;
            height: 0;
        }

        /* 화면 레이아웃 공통 베이스 (flex) */
        #start-screen, #question-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 14px;
            justify-content: flex-start;
        }

        /* 결과 화면 레이아웃 (gap 12px 조절, 스크롤바 대책 적용) */
        #result-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            justify-content: flex-start;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #result-screen::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        /* 🚨 [버튼 뭉개짐 방지 규칙] 메인 버튼 스타일 */
        .main-btn {
            width: 100%;
            min-height: 52px;               /* height 대신 min-height 사용 */
            flex-shrink: 0;                 /* 절대 줄어들지 않게 설정 */
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;               /* 카드 하단에 자연스럽게 정착 */
            border: none;
            background-color: #4f46e5;
            color: #ffffff;
            transition: background-color 0.2s, transform 0.1s;
        }
        .main-btn:hover {
            background-color: #4338ca;
            transform: translateY(-1px);    /* 미세 효과만 허용, 카드 이탈 방지 */
        }

        /* 이전 버튼 (좌상단 원형 화살표) */
        .back-btn {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            position: absolute;
            top: 14px;
            left: 14px;
            border-radius: 50%;
            border: 1px solid #e5e5e5;
            background-color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* 진행률 표시 영역 */
        .progress-container {
            margin-top: 24px; /* 이전 버튼 공간 확보 */
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .progress-text {
            font-size: 14px;
            font-weight: bold;
            color: #4f46e5;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
        }
        .progress-bar-fill {
            height: 100%;
            width: 20%;
            background-color: #4f46e5;
            border-radius: 4px;
            transition: width 0.25s ease;
        }

        /* 질문 텍스트 */
        .question-text {
            font-size: 18px;
            font-weight: bold;
            color: #1f2937;
            margin: 10px 0;
        }

        /* 선택지 그룹 및 개별 카드 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;                      /* 다닥다닥 붙지 않도록 gap 필수 설정 */
        }
        .option-card {
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e5e5e5;
            flex-shrink: 0;
            background-color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .option-card:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }
        .option-card input[type="radio"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #4f46e5;
        }
        .option-card.selected {
            border-color: #4f46e5;
            background-color: #f5f3ff;
        }

        /* 시작화면 타이틀 및 디자인 스타일 */
        .title-area {
            text-align: center;
            margin-top: 40px;
        }
        .title-area h1 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 16px;
        }
        .title-area p {
            font-size: 15px;
            color: #4b5563;
        }
        .main-emoji {
            font-size: 70px;
            margin: 20px 0;
        }

        /* 결과 화면 내부 요소 및 박스 구분 스타일 */
        .result-title {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            color: #1f2937;
            margin-top: 10px;
        }
        .result-emoji-box {
            text-align: center;
        }
        .result-type-name {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            color: #1f2937;
            margin-bottom: 5px;
        }
        .gray-box {
            padding: 12px 14px;
            background-color: #f3f4f6;
            border-radius: 8px;
            font-size: 14px;
            color: #374151;
        }
        .feature-box {
            padding: 10px 14px;
            background-color: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #4b5563;
        }
        .heritage-box {
            border-left: 4px solid #b08968;
            padding: 10px 14px;
            background-color: #faf3e7;
            border-radius: 8px;
            font-size: 13px;
            color: #4b5563;
        }
        .keywords-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .keyword-chip {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
        }
        .suggestion-box {
            background-color: #f4fbe8;
            border: 2px solid #d4e8b0;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #3f6212;
        }

        /* 화면 슬라이드 효과 처리를 위한 기본 트랜지션 클래스 */
        .fade-in-slide {
            animation: fadeInSlide 0.25s ease-out forwards;
        }
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 푸터 스타일 */
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-card">
        
        <div id="start-screen">
            <div class="title-area">
                <div class="main-emoji">🏺</div>
                <h1>내가 끌리는 역사 감성 찾기</h1>
                <p>내가 가장 끌리는 역사 감성은 무엇일까요? 아래의 질문에 답하고 나의 역사 감성을 알아보아요!</p>
            </div>
            <button class="main-btn" onclick="startQuiz()">🚀 나의 역사 감성 알아보기</button>
        </div>

        <div id="question-screen" style="display: none;">
            <button type="button" class="back-btn" id="prev-btn" onclick="prevQuestion()">⬅️</button>
            
            <div class="progress-container">
                <div class="progress-text" id="progress-text">Q1/5</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
            </div>

            <div class="question-text" id="question-title"></div>

            <div class="options" id="options-container">
                </div>

            <button class="main-btn" id="next-btn" onclick="nextQuestion()"></button>
        </div>

        <div id="result-screen" style="display: none;">
            <div class="result-title">📊 나의 역사 감성 결과</div>
            
            <div class="result-emoji-box" id="result-emoji" style="font-size: 90px; line-height: 1;"></div>
            
            <div class="result-type-name" id="result-type"></div>
            
            <div class="gray-box" id="result-description"></div>
            
            <div class="feature-box" id="result-feature"></div>
            <div class="heritage-box" id="result-heritage"></div>
            
            <div class="keywords-container" id="result-keywords"></div>
            
            <div class="suggestion-box" id="result-suggestion"></div>
            
            <button class="main-btn" onclick="resetQuiz()">🔄 다시 하기</button>
        </div>

    </div>

    <footer>
        <p>AI의 도움을 받아 제작된 콘텐츠입니다.</p>
    </footer>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // [질문 데이터 데이터셋 — 한 글자도 수정 금지 사양 준수]
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const QUESTIONS = [
            {
                num: 1,
                title: "Q1. 더 끌리는 역사 유물의 특징은?",
                options: [
                    { text: "① 금빛 장신구처럼 화려하고 정교한 유물 👑", type: "신라 화려형" },
                    { text: "② 고분 벽화처럼 힘차고 역동적인 표현 ⚔️", type: "고구려 역동형" },
                    { text: "③ 금동대향로처럼 섬세하고 우아한 공예 🍃", type: "백제 우아형" },
                    { text: "④ 백자처럼 절제되고 실용적인 아름다움 🌿", type: "조선 절제형" }
                ]
            },
            {
                num: 2,

                    { text: "② 수렵도, 사신도처럼 움직임이 느껴지는 고분 벽화 전시 🐎", type: "고구려 역동형" },
                    { text: "③ 향로, 관식, 석수처럼 섬세하고 우아한 공예품 전시 🎨", type: "백제 우아형" }, // 1단계 사양 텍스트 보존
                    { text: "④ 백자, 기록유산, 과학기구처럼 쓰임이 분명한 유물 전시 📚", type: "조선 절제형" }
                ]
            },
            {
                num: 3,
                title: "Q3. 내가 더 가지고 싶은 굿즈는?",

                    { text: "① 금관 무늬를 활용한 화려한 액세서리 💎", type: "신라 화려형" },
                    { text: "② 고구려 벽화 속 말과 인물을 활용한 다이내믹 굿즈 🛡️", type: "고구려 역동형" },
                    { text: "③ 백제 문양을 활용한 우아한 향낭이나 공예 소품 🍶", type: "백제 우아형" },
                    { text: "④ 백자와 한글을 활용한 깔끔한 문구류 ✍️", type: "조선 절제형" }
                ]
            },
            {
                num: 4,
                title: "Q4. 더 가보고 싶은 역사 공간은?",
                options: [
                    { text: "① 신라 금관과 왕릉 문화를 볼 수 있는 경주 🏺", type: "신라 화려형" },
                    { text: "② 고구려 고분 벽화와 광개토대왕릉비를 떠올릴 수 있는 전시관 🐎", type: "고구려 역동형" },
                    { text: "③ 백제 문화유산과 공예의 아름다움을 볼 수 있는 공주·부여 🏛️", type: "백제 우아형" },
                    { text: "④ 궁궐, 서원, 기록문화를 함께 볼 수 있는 조선 역사 공간 🌿", type: "조선 절제형" }
                ]
            },
            {
                num: 5,
                title: "Q5. 내가 더 좋아하는 활동은?",
                options: [
                    { text: "① 눈에 띄는 문양과 색으로 꾸미기 ✨", type: "신라 화려형" },
                    { text: "② 넓은 무대에서 힘차게 움직이며 탐험하기 🚀", type: "고구려 역동형" },
                    { text: "③ 섬세한 문양을 관찰하고 직접 만들어 보기 🎨", type: "백제 우아형" },
                    { text: "④ 내용을 기록하고 의미를 차분히 정리하기 📖", type: "조선 절제형" }
                ]
            }
        ];

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // [20개 실천제안 풀 — JS 배열 고대로 유지]
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          "신라 화려형": [

          ],
          "고구려 역동형": [

            "광개토대왕릉비 이야기를 친구들에게 설명하는 미니 발표에 도전해 보세요!",

        /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           [학습 포인트 주석]
           - 객체와 배열의 차이: SUGGESTIONS는 중괄호 {} 형태의 객체이며 유형명을 Key값으로 가집니다. 각 유형 내부에는 대괄호 [] 형태의 문자열 배열이 위치합니다.
           - Math.random()과 Math.floor() 조합: 0 이상 1 미만의 소수점 값을 도출하는 무작위 난수에 배열 길이를 곱해, 내림 처리로 유효 인덱스 번호를 무작위 선정합니다.
           - 학생들은 이 배열 안에 본인만의 아이디어를 추가하여 커스텀 확장을 시도해볼 수 있습니다.
           ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
        function getRandomSuggestion(type) {
          const list = SUGGESTIONS[type];
          const idx = Math.floor(Math.random() * list.length);
          return list[idx];
        }

        // 결과 유형별 원형 데이터 셋 (1단계 정밀 보존)
        const RESULT_DATA = {
            "신라 화려형": {
                emoji: "👑",
                desc: "금관과 장신구처럼 화려하고 정교한 아름다움에 끌리는 타입입니다.",
                feature: "황금 문화, 불교문화, 왕릉 문화, 정교한 금속 공예",
                heritage: "금관총 금관, 천마총 금관, 천마총 금제 허리띠, 경주 황오동 금귀걸이",
                keywords: ["#화려함", "#황금문화", "#왕릉문화", "#정교함"]
            },
            "고구려 역동형": {
                emoji: "⚔️",
                desc: "힘 있고 활동적인 분위기와 도전적인 이야기에 끌리는 타입입니다.",
                feature: "기마 문화, 고분 벽화, 강한 국방 문화, 역동적인 표현",
                heritage: "수렵도, 고구려 고분 벽화, 장군총, 광개토대왕릉비",
                keywords: ["#역동성", "#기상", "#도전", "#벽화"]
            },
            "백제 우아형": {
                emoji: "🍃",
                desc: "섬세하고 세련된 공예와 조화로운 아름다움에 끌리는 타입입니다.",
                feature: "세련된 공예 문화, 불교 예술, 부드럽고 우아한 조형미",
                heritage: "백제 금동대향로, 무령왕릉 석수, 무령왕 금제 관식, 부여 정림사지 오층석탑",
                keywords: ["#우아함", "#세련미", "#공예", "#조화"]
            },
            "조선 절제형": {
                emoji: "🌿",
                desc: "단정하고 실용적이며 오래 보아도 질리지 않는 아름다움에 끌리는 타입입니다.",
                feature: "유교 문화, 기록 문화, 과학기술, 절제된 생활미",
                heritage: "백자 달항아리, 훈민정음 해례본, 앙부일구, 측우기",
                keywords: ["#절제미", "#기록문화", "#실용성", "#단정함"]
            }
        };

        // 앱 구동 전역 상태 변수
        let currentIdx = 0;
        let userResponses = {}; // 각 문항 번호별 선택된 유형 저장 객체

        // 퀴즈 시작 함수
        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            currentIdx = 0;
            userResponses = {};
            renderQuestion();
        }

        // 질문 화면 렌더링 함수
        function renderQuestion() {
            const screen = document.getElementById('question-screen');
            screen.classList.remove('fade-in-slide');
            void screen.offsetWidth; // 리플로우 강제 발생으로 애니메이션 리셋
            screen.classList.add('fade-in-slide');

            const currentQuestion = QUESTIONS[currentIdx];
            
            // 상단 진행률 정보 업데이트
            document.getElementById('progress-text').innerText = `Q${currentIdx + 1}/5`;
            document.getElementById('progress-bar-fill').style.width = `${(currentIdx + 1) * 20}%`;

            // 이전 버튼 처리 (Q1일 경우 visibility hidden 처리)
            const prevBtn = document.getElementById('prev-btn');
            if (currentIdx === 0) {
                prevBtn.style.visibility = 'hidden';
            } else {
                prevBtn.style.visibility = 'visible';
            }

            // 질문 내용 주입
            document.getElementById('question-title').innerText = currentQuestion.title;

            // 4지선다 컨테이너 초기화 및 동적 생성
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            currentQuestion.options.forEach((opt, index) => {
                const labelCard = document.createElement('label');
                labelCard.className = 'option-card';
                
                // 기존 선택값 있는 경우 하이라이팅 연동
                if (userResponses[currentIdx] === opt.type) {
                    labelCard.classList.add('selected');
                }

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${currentIdx + 1}`;
                radio.value = opt.type;
                if (userResponses[currentIdx] === opt.type) {
                    radio.checked = true;
                }

                // 무조건 동일 name 그룹핑 하에 클릭 이벤트 매핑 처리
                radio.addEventListener('change', () => {
                    // 동적 클래스 변경 단선 처리
                    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    labelCard.classList.add('selected');
                    userResponses[currentIdx] = opt.type;
                });

                labelCard.appendChild(radio);
                
                const textSpan = document.createElement('span');
                textSpan.innerText = opt.text;
                labelCard.appendChild(textSpan);

                container.appendChild(labelCard);
            });

            // 🚨 버튼 라벨 통일 규칙 적용
            const nextBtn = document.getElementById('next-btn');
            if (currentIdx === QUESTIONS.length - 1) {
                nextBtn.innerText = "📊 나의 역사 감성 알아보기";
            } else {
                nextBtn.innerText = "다음 질문으로 ➡️";
            }
        }

        // 다음 단계 및 결과 연산 분기 함수
        function nextQuestion() {
            // 현재 문항 미선택 응답 방어 검사 사양 적용
            if (!userResponses[currentIdx]) {
                alert("답변을 선택해 주세요.");
                return;
            }

            if (currentIdx < QUESTIONS.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // 이전 단계 이동 처리 함수
        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        // 점수 집계 및 최종 유형 산출 연산식
        function calculateResult() {
            const scores = {
                "신라 화려형": 0,
                "고구려 역동형": 0,
                "백제 우아형": 0,
                "조선 절제형": 0
            };

            // 선택 매핑 누적 연산
            for (let idx in userResponses) {
                const type = userResponses[idx];
                scores[type]++;
            }

            // 동점 우선순위 처리 규칙: 신라 → 고구려 → 백제 → 조선 순서 적용
            const priorityOrder = ["신라 화려형", "고구려 역동형", "백제 우아형", "조선 절제형"];
            let highestType = priorityOrder[0];
            let maxScore = scores[highestType];

            for (let i = 1; i < priorityOrder.length; i++) {
                const currentType = priorityOrder[i];
                if (scores[currentType] > maxScore) {
                    maxScore = scores[currentType];
                    highestType = currentType;
                }
            }

            // 결과 화면 데이터 연동 바인딩 (9단계 고정 순서 미누락 준수)
            const data = RESULT_DATA[highestType];

            // ② 유형 이모지 대입
            document.getElementById('result-emoji').innerText = data.emoji;
            // ③ 유형명 출력
            document.getElementById('result-type').innerText = highestType;
            // ⑤ 어떤 역사 감성일까? 출력
            document.getElementById('result-description').innerText = `어떤 역사 감성일까?: ${data.desc}`;
            
            // ⑥ 역사 특징 & 대표 문화유산 분리 차별화 출력 (요약/등 축소 배제)
            document.getElementById('result-feature').innerText = `📜 역사 특징: ${data.feature}`;
            document.getElementById('result-heritage').innerText = `🏛️ 대표 문화유산: ${data.heritage}`;
            
            // ⑦ 강점 키워드 해시태그 칩 연동 출력
            const kwContainer = document.getElementById('result-keywords');
            kwContainer.innerHTML = '';
            data.keywords.forEach(kw => {
                const chip = document.createElement('span');
                chip.className = 'keyword-chip';
                chip.innerText = kw;
                kwContainer.appendChild(chip);
            });

            // ⑧ 💡 실천제안 (getRandomSuggestion 무작위 반환 바인딩)
            const randomSuggestion = getRandomSuggestion(highestType);
            document.getElementById('result-suggestion').innerText = `💡 실천제안: ${randomSuggestion}`;

            // 화면 가시성 교체식 전환
            document.getElementById('question-screen').style.display = 'none';
            
            const resScreen = document.getElementById('result-screen');
            resScreen.style.display = 'flex';
            resScreen.scrollTop = 0; // 스크롤 상단 리셋
        }

        // 다시 하기 내부 복귀 로직
        function resetQuiz() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            currentIdx = 0;
            userResponses = {};
        }
    </script>
</body>
</html>
