<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 스타일 알아보기</title>
    <style>
        /* [모바일 안전 세트 2] 최소한의 레이아웃 CSS만 적용 (화려한 디자인용 CSS는 1단계 규칙에 따라 작성하지 않음) */
        * {
            box-sizing: border-box; /* 패딩과 테두리를 포함해서 크기를 계산하도록 설정하여 화면 밖으로 벗어나는 것을 막아줍니다. */
        }
        body {
            max-width: 100%; /* 화면 너비가 브라우저를 넘지 않도록 제한합니다. */
            overflow-x: hidden; /* 가로 스크롤바가 생기는 것을 방지합니다. */
            word-break: keep-all; /* 한글 단어가 중간에서 끊기지 않고 줄바꿈이 되도록 도와줍니다. */
            padding: 16px;
            font-family: sans-serif;
        }

        /* 결과 화면 출력을 위한 가이드라인 구조용 최소 CSS */
        #result-container {
            margin-top: 30px;
            padding: 16px;
            border: 1px solid #ccc;
        }
        .type-emoji {
            font-size: 80px; /* ② 유형 이모지: 규칙에 따라 80~100px 크기로 지정 */
            margin: 10px 0;
        }
        .type-name {
            font-size: 28px; /* ③ 유형명: 규칙에 따라 28px bold 지정 */
            font-weight: bold;
            margin-bottom: 15px;
        }
        .style-box {
            background-color: #f0f0f0; /* ⑤ 어떤 스타일일까: 회색 박스 */
            padding: 12px 14px; /* padding 12px 14px 지정 */
            margin-bottom: 15px;
        }
        .place-box {
            background-color: #fbf8f3; /* ⑥ 추천 장소: 베이지·세피아 톤 박스 */
            border-left: 4px solid #d4a373; /* border-left 4px solid #d4a373 지정 */
            padding: 12px 14px;
            margin-bottom: 15px;
        }
        .keyword-box {
            margin-bottom: 15px; /* ⑦ 강점 키워드 박스 */
        }
        .keyword-chip {
            display: inline-block;
            background-color: #e0e0e0;
            padding: 4px 8px;
            margin-right: 6px;
            border-radius: 4px;
            font-size: 14px;
        }
        .suggestion-box {
            background-color: #f9fced; /* ⑧ 💡 실천제안: 노란/연두 배경 */
            border: 1px solid #d8e2b7; /* 테두리 포함 */
            padding: 12px 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>🧳 나의 여행 스타일 알아보기</h1>
    <p>내가 가장 좋아하는 여행은 어떤 모습일까요? 아래의 질문에 답하고 나의 여행 스타일을 알아보아요!</p>

    <hr>

    <form id="quiz-form">
        <div>
            <p><strong>Q1. 여행 가기 전 나는?</strong></p>
            <label><input type="radio" name="q1" value="맛집 탐험형"> ① 맛집과 간식 정보를 먼저 찾아본다 🍜</label><br>
            <label><input type="radio" name="q1" value="감성 작가형"> ② 예쁜 장소와 사진을 먼저 모은다 📸</label><br>
            <label><input type="radio" name="q1" value="일정 마스터형"> ③ 이동 경로와 일정을 먼저 정리한다 📖</label><br>
            <label><input type="radio" name="q1" value="액티비티 러버형"> ④ 재미있는 체험 활동을 먼저 찾아본다 🎡</label>
        </div>

        <div>
            <p><strong>Q2. 여행에서 더 중요한 것은?</strong></p>
            <label><input type="radio" name="q2" value="맛집 탐험형"> ① 맛집으로 소문난 식당 방문하기 🍢</label><br>
            <label><input type="radio" name="q2" value="감성 작가형"> ② 예쁜 풍경과 사진 ✨</label><br>
            <label><input type="radio" name="q2" value="일정 마스터형"> ③ 효율적인 동선 🚆</label><br>
            <label><input type="radio" name="q2" value="액티비티 러버형"> ④ 직접 해보는 체험 🎢</label>
        </div>

        <div>
            <p><strong>Q3. 여행 중 가장 많이 하는 행동은?</strong></p>
            <label><input type="radio" name="q3" value="맛집 탐험형"> ① 맛집 후기를 찾아본다 📱</label><br>
            <label><input type="radio" name="q3" value="감성 작가형"> ② 풍경 사진을 찍는다 📸</label><br>
            <label><input type="radio" name="q3" value="일정 마스터형"> ③ 다음 장소 시간을 확인한다 ⏰</label><br>
            <label><input type="radio" name="q3" value="액티비티 러버형"> ④ 체험 활동에 참여한다 🧗</label>
        </div>

        <div>
            <p><strong>Q4. 더 가보고 싶은 장소는?</strong></p>
            <label><input type="radio" name="q4" value="맛집 탐험형"> ① 시장과 먹거리 거리 🍡</label><br>
            <label><input type="radio" name="q4" value="감성 작가형"> ② 야경 명소와 감성 거리 🌃</label><br>
            <label><input type="radio" name="q4" value="일정 마스터형"> ③ 유명 관광지와 투어 코스 🗺️</label><br>
            <label><input type="radio" name="q4" value="액티비티 러버형"> ④ 놀이공원과 체험 공간 🎠</label>
        </div>

        <div>
            <p><strong>Q5. 여행 예산을 더 쓰고 싶은 곳은?</strong></p>
            <label><input type="radio" name="q5" value="맛집 탐험형"> ① 음식과 디저트 🍰</label><br>
            <label><input type="radio" name="q5" value="감성 작가형"> ② 사진 찍을 소품이나 굿즈 🎀</label><br>
            <label><input type="radio" name="q5" value="일정 마스터형"> ③ 이동과 숙소 🚄</label><br>
            <label><input type="radio" name="q5" value="액티비티 러버형"> ④ 체험과 액티비티 🎟️</label>
        </div>

        <div>
            <p><strong>Q6. 여행 중 예상치 못한 상황이 생긴다면?</strong></p>
            <label><input type="radio" name="q6" value="맛집 탐험형"> ① 새로운 맛집을 찾는 재미가 생긴다 🍜</label><br>
            <label><input type="radio" name="q6" value="감성 작가형"> ② 우연히 발견한 장소 사진부터 찍는다 📸</label><br>
            <label><input type="radio" name="q6" value="일정 마스터형"> ③ 바로 일정을 다시 정리한다 📖</label><br>
            <label><input type="radio" name="q6" value="액티비티 러버형"> ④ 새로운 체험처럼 즐긴다 🎢</label>
        </div>

        <br><br>
        <button type="button" onclick="calculateResult()">📊 나의 여행 스타일 알아보기</button>
    </form>

    <div id="result-container" style="display: none;">
        <h2>📊 나의 여행 스타일 결과</h2>
        
        <div id="result-emoji" class="type-emoji"></div>
        
        <div id="result-name" class="type-name"></div>
        
        <div id="result-desc" class="style-box"></div>
        
        <div id="result-places" class="place-box"></div>
        
        <div id="result-keywords" class="keyword-box"></div>
        
        <div id="result-suggestion" class="suggestion-box"></div>
        
        <button type="button" onclick="resetQuiz()">🔄 다시 하기</button>
    </div>

    <br><br>
    <hr>
    <footer>
        <p style="font-size: 12px; color: gray;">AI의 도움을 받아 제작된 콘텐츠입니다.</p>
    </footer>

    <script>
        /* [학습 포인트 주석: 객체와 배열의 차이]
          - SUGGESTIONS은 중괄호 {}를 사용한 '객체(Object)'입니다. 키(Key)와 값(Value)으로 데이터를 저장해요.
          - 각 키 안에는 대괄호 []를 사용한 '배열(Array)'이 들어있어 여러 개의 문장을 순서대로 보관합니다.
          - 학생 여러분이 직접 배열 안에 새로운 문장을 쉼표(,)로 구분해서 추가하면 나만의 실천제안을 더 만들 수 있어요!
        */
        const SUGGESTIONS = {
            "맛집 탐험형": [
                "여행 가기 전 지역 시장 맛집 지도를 직접 그려 보세요!",
                "여행지에서 가장 기억에 남는 음식 사진과 한 줄 후기를 남겨 보세요!",
                "친구·가족과 '오늘의 맛집 BEST 3' 미션을 만들어 보세요!",
                "여행에서 새로 발견한 간식 5가지를 정리해 보세요!",
                "여행 후 '나만의 맛집 지도'를 만들어 친구에게 추천해 보세요!",
            ],
            "감성 작가형": [
                "여행지에서 '오늘의 인생샷' 한 장을 매일 남겨 보세요!",
                "감성 카페나 포토존을 미리 조사해 사진 동선을 만들어 보세요!",
                "여행 사진으로 작은 포토북이나 카드뉴스를 만들어 보세요!",
                "해 질 무렵 하늘 색을 매일 사진으로 기록해 보세요!",
                "여행지의 풍경을 짧은 글이나 시로 표현해 보세요!",
            ],
            "일정 마스터형": [
                "여행 전 '나만의 동선표'를 시간 단위로 만들어 보세요!",
                "이동·식사·관광 시간을 정리한 미니 가이드북을 만들어 보세요!",
                "여행 중 예상 시간과 실제 시간을 비교해 기록해 보세요!",
                "여행 짐 체크리스트를 만들어 가족에게 공유해 보세요!",
                "다녀온 여행 일정을 정리해 친구에게 추천 코스로 알려 주세요!",
            ],
            "액티비티 러버형": [
                "여행지에서 평소 안 해본 체험 활동 1가지에 꼭 도전해 보세요!",
                "걷기·자전거 등 몸을 움직이는 여행 코스를 만들어 보세요!",
                "체험 후 '오늘 가장 재미있었던 순간'을 일기로 써 보세요!",
                "친구·가족과 함께 즐길 미션형 체험 코스를 만들어 보세요!",
                "다음 여행에서 도전할 액티비티 위시리스트를 작성해 보세요!",
            ],
        };

        /*
          [학습 포인트 주석: 무작위 인덱스 뽑기와 함수]
          - Math.random()은 0 이상 1 미만의 소수를 무작위로 만들어 줍니다.
          - 여기에 list.length(배열의 크기, 여기서는 5)를 곱하면 0.0 ~ 4.999... 사이의 숫자가 됩니다.
          - Math.floor()는 소수점 아래를 버려서 0, 1, 2, 3, 4 중 하나의 '정수 인덱스'로 만들어 줍니다.
          - return 키워드는 함수가 실행된 결과값을 함수를 부른 곳으로 돌려주는(반환하는) 역할을 합니다.
        */
        function getRandomSuggestion(type) {
            const list = SUGGESTIONS[type];
            const idx = Math.floor(Math.random() * list.length);
            return list[idx];
        }

        // 결과 고정 데이터 (한 글자도 수정 금지 조건 반영)
        const RESULT_DATA = {
            "맛집 탐험형": {
                emoji: "🍜",
                desc: "여행에서 맛있는 음식과 새로운 간식을 찾는 것을 좋아하는 타입입니다.",
                places: "시장 거리, 야시장, 먹거리 골목, 디저트 카페",
                keywords: ["먹방", "맛집", "간식", "시장투어"]
            },
            "감성 작가형": {
                emoji: "📸",
                desc: "예쁜 풍경과 감성적인 장소를 좋아하는 타입입니다. 사진을 찍고 추억을 남기는 활동을 즐깁니다.",
                places: "야경 명소, 감성 카페, 바다 풍경, 포토존 거리",
                keywords: ["감성", "사진", "풍경", "인생샷"]
            },
            "일정 마스터형": {
                emoji: "📖",
                desc: "여행 계획을 꼼꼼하게 세우는 타입입니다. 효율적으로 움직일 때 만족감을 느깁니다.",
                places: "도심 여행, 투어 코스, 박물관, 문화 공간",
                keywords: ["계획형", "동선", "정리", "효율"]
            },
            "액티비티 러버형": {
                emoji: "🎡",
                desc: "직접 체험하고 움직이는 것을 좋아하는 타입입니다. 가만히 보기보다 몸으로 즐기는 여행을 더 재미있게 느깁니다.",
                places: "놀이공원, 체험 공간, 액티비티 존, 테마파크",
                keywords: ["체험", "활동", "액티비티", "에너지"]
            }
        };

        // 결과 계산 로직 함수
        function calculateResult() {
            const form = document.getElementById('quiz-form');
            
            // 모든 문항(q1~q6)에 대해 체크 여부 확인
            for (let i = 1; i <= 6; i++) {
                const checkedRadio = form.querySelector(`input[name="q${i}"]:checked`);
                if (!checkedRadio) {
                    alert("답변을 선택해 주세요.");
                    return; // 하나라도 체크 안 되어 있으면 함수를 즉시 종료합니다.
                }
            }

            // 점수 초기화
            const scores = {
                "맛집 탐험형": 0,
                "감성 작가형": 0,
                "일정 마스터형": 0,
                "액티비티 러버형": 0
            };

            // 선택된 값에 따라 단일 점수 +1씩 계산
            for (let i = 1; i <= 6; i++) {
                const value = form.querySelector(`input[name="q${i}"]:checked`).value;
                scores[value] += 1;
            }

            /* [동점 시 우선순위 규칙 적용]
              - 맛집 탐험형 -> 감성 작가형 -> 일정 마스터형 -> 액티비티 러버형 순서로 우선순위를 둡니다.
              - 아래 배열의 순서가 곧 우선순위가 됩니다.
            */
            const priorityOrder = ["맛집 탐험형", "감성 작가형", "일정 마스터형", "액티비티 러버형"];
            let highestType = priorityOrder[0];
            let maxScore = scores[highestType];

            for (let i = 1; i < priorityOrder.length; i++) {
                const currentType = priorityOrder[i];
                // > 기호를 사용함으로써, 뒤의 유형 점수가 '엄격히 클 때만' 최고 점수 유형을 바꿉니다. 
                // 따라서 점수가 같을 때는 먼저 나온 앞 순서의 유형이 유지됩니다.
                if (scores[currentType] > maxScore) {
                    maxScore = scores[currentType];
                    highestType = currentType;
                }
            }

            // 결과 화면에 데이터 매핑하여 출력하기
            const data = RESULT_DATA[highestType];
            
            document.getElementById('result-emoji').innerText = data.emoji; // ② 유형 이모지
            document.getElementById('result-name').innerText = highestType; // ③ 유형명
            document.getElementById('result-desc').innerText = "어떤 스타일일까?: " + data.desc; // ⑤ 설명
            document.getElementById('result-places').innerText = "📍 추천 장소: " + data.places; // ⑥ 추천 장소 (쉼표 형태 그대로 유지)

            // ⑦ 강점 키워드 해시태그 칩 형태로 변환하여 출력
            const keywordContainer = document.getElementById('result-keywords');
            keywordContainer.innerHTML = "";
            data.keywords.forEach(word => {
                const chip = document.createElement('span');
                chip.className = "keyword-chip";
                chip.innerText = "#" + word;
                keywordContainer.appendChild(chip);
            });

            // ⑧ 💡 실천제안 무작위 추출 및 출력 (라벨 유지)
            const randomSuggestion = getRandomSuggestion(highestType);
            document.getElementById('result-suggestion').innerText = "💡 실천제안: " + randomSuggestion;

            // 결과 영역을 화면에 표시
            document.getElementById('result-container').style.display = "block";
            
            // 결과 창으로 화면 부드럽게 스크롤 이동
            document.getElementById('result-container').scrollIntoView({ behavior: 'smooth' });
        }

        // ⑨ 다시 하기 기능: 모든 선택값, 점수, 결과를 초기화합니다.
        function resetQuiz() {
            document.getElementById('quiz-form').reset(); // 라디오 버튼 초기화
            document.getElementById('result-container').style.display = "none"; // 결과 영역 다시 숨기기
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 화면 맨 위로 이동
        }
    </script>
</body>
</html>
