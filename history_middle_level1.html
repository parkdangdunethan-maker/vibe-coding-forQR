<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏺 내가 끌리는 역사 감성 찾기</title>
    <style>
        /* [모바일 안전 세트 2] 최소 CSS 규칙 정의 */
        * {
            /* 모든 요소의 테두리와 안쪽 여백(padding)을 너비에 포함시켜 계산을 쉽게 만듭니다. */
            box-sizing: border-box; 
        }
        body {
            /* 모바일 화면 밖으로 콘텐츠가 삐져나가지 않도록 방지합니다. */
            max-width: 100%;
            overflow-x: hidden;
            /* 단어가 이상하게 잘리지 않고 문장 단위로 자연스럽게 줄바꿈되도록 합니다. */
            word-break: keep-all;
            font-family: sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        /* 6번 결과 화면 구성 요소를 위한 CSS 차별화 (디자인이 아닌 구조 분리용) */
        .gray-box {
            padding: 12px 14px;
            background-color: #f0f0f0;
            margin-bottom: 10px;
        }
        .feature-box {
            padding: 10px 14px;
            background-color: #e8e8e8;
            margin-bottom: 10px;
        }
        .heritage-box {
            border-left: 4px solid #b08968;
            padding: 10px 14px;
            background-color: #fbf8f3;
            margin-bottom: 10px;
        }
        /* 8번 💡 실천제안 강조 박스 */
        .suggestion-box {
            background-color: #f4fbe8;
            border: 2px solid #d4e8b0;
            padding: 12px 14px;
            margin-bottom: 15px;
        }
        /* 결과 영역 초기 상태 (처음에는 숨김) */
        #result-section {
            display: none;
            margin-top: 30px;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏺 내가 끌리는 역사 감성 찾기</h1>
        <p>내가 가장 끌리는 역사 감성은 무엇일까요? 아래의 질문에 답하고 나의 역사 감성을 알아보아요!</p>
    </header>

    <hr>

    <main>
        <form id="quiz-form">
            <div class="question-group">
                <h3>Q1. 더 끌리는 역사 유물의 특징은?</h3>
                <label><input type="radio" name="q1" value="신라 화려형"> ① 금빛 장신구처럼 화려하고 정교한 유물 👑</label><br>
                <label><input type="radio" name="q1" value="고구려 역동형"> ② 고분 벽화처럼 힘차고 역동적인 표현 ⚔️</label><br>
                <label><input type="radio" name="q1" value="백제 우아형"> ③ 금동대향로처럼 섬세하고 우아한 공예 🍃</label><br>
                <label><input type="radio" name="q1" value="조선 절제형"> ④ 백자처럼 절제되고 실용적인 아름다움 🌿</label>
            </div>
            <br>

            <div class="question-group">
                <h3>Q2. 박물관에서 가장 오래 보고 싶은 전시는?</h3>
                <label><input type="radio" name="q2" value="신라 화려형"> ① 금관, 금제 허리띠 등 반짝이는 장신구 전시 ✨</label><br>
                <label><input type="radio" name="q2" value="고구려 역동형"> ② 수렵도, 사신도처럼 움직임이 느껴지는 고분 벽화 전시 🐎</label><br>
                <label><input type="radio" name="q2" value="백제 우아형"> ③ 향로, 관식, 석수처럼 섬세한 공예품 전시 🎨</label><br>
                <label><input type="radio" name="q2" value="조선 절제형"> ④ 백자, 기록유산, 과학기구처럼 쓰임이 분명한 유물 전시 📚</label>
            </div>
            <br>

            <div class="question-group">
                <h3>Q3. 내가 더 가지고 싶은 굿즈는?</h3>
                <label><input type="radio" name="q3" value="신라 화려형"> ① 금관 무늬를 활용한 화려한 액세서리 💎</label><br>
                <label><input type="radio" name="q3" value="고구려 역동형"> ② 고구려 벽화 속 말과 인물을 활용한 다이내믹 굿즈 🛡️</label><br>
                <label><input type="radio" name="q3" value="백제 우아형"> ③ 백제 문양을 활용한 우아한 향낭이나 공예 소품 🍶</label><br>
                <label><input type="radio" name="q3" value="조선 절제형"> ④ 백자와 한글을 활용한 깔끔한 문구류 ✍️</label>
            </div>
            <br>

            <div class="question-group">
                <h3>Q4. 더 가보고 싶은 역사 공간은?</h3>
                <label><input type="radio" name="q4" value="신라 화려형"> ① 신라 금관과 왕릉 문화를 볼 수 있는 경주 🏺</label><br>
                <label><input type="radio" name="q4" value="고구려 역동형"> ② 고구려 고분 벽화와 광개토대왕릉비를 떠올릴 수 있는 전시관 🐎</label><br>
                <label><input type="radio" name="q4" value="백제 우아형"> ③ 백제 문화유산과 공예의 아름다움을 볼 수 있는 공주·부여 🏛️</label><br>
                <label><input type="radio" name="q4" value="조선 절제형"> ④ 궁궐, 서원, 기록문화를 함께 볼 수 있는 조선 역사 공간 🌿</label>
            </div>
            <br>

            <div class="question-group">
                <h3>Q5. 내가 더 좋아하는 활동은?</h3>
                <label><input type="radio" name="q5" value="신라 화려형"> ① 눈에 띄는 문양과 색으로 꾸미기 ✨</label><br>
                <label><input type="radio" name="q5" value="고구려 역동형"> ② 넓은 무대에서 힘차게 움직이며 탐험하기 🚀</label><br>
                <label><input type="radio" name="q5" value="백제 우아형"> ③ 섬세한 문양을 관찰하고 직접 만들어 보기 🎨</label><br>
                <label><input type="radio" name="q5" value="조선 절제형"> ④ 내용을 기록하고 의미를 차분히 정리하기 📖</label>
            </div>
            <br>

            <button type="button" onclick="calculateResult()">📊 나의 역사 감성 알아보기</button>
        </form>
    </main>

    <section id="result-section">
        <h2>📊 나의 역사 감성 결과</h2>
        
        <div id="result-emoji" style="font-size: 80px; line-height: 1;"></div>
        
        <div id="result-type" style="font-size: 28px; font-weight: bold; margin-bottom: 15px;"></div>
        
        <div id="result-description" class="gray-box"></div>
        
        <div id="result-feature" class="feature-box"></div>
        <div id="result-heritage" class="heritage-box"></div>
        
        <div id="result-keywords" style="margin-bottom: 15px; font-weight: bold; color: #4a5568;"></div>
        
        <div id="result-suggestion" class="suggestion-box"></div>
        
        <button type="button" onclick="resetQuiz()">🔄 다시 하기</button>
    </section>

    <hr>
    <footer>
        <p style="font-size: 12px; color: #666;">AI의 도움을 받아 제작된 콘텐츠입니다.</p>
    </footer>

    <script>
        /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           [학습포인트 주석 - 객체(Object)와 배열(Array)의 차이]
           - SUGGESTIONS는 '중괄호 {}'를 사용한 '객체'입니다. 키(Key)와 값(Value)으로 데이터를 묶습니다.
           - 각 유형 이름 안에는 '대괄호 []'를 사용한 '배열'이 들어있어, 여러 개의 제안 문장을 순서대로 담고 있습니다.
           ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
        const SUGGESTIONS = {
          "신라 화려형": [
            "경주 박물관의 금관·금제 허리띠를 골라 굿즈 디자인 아이디어를 그려 보세요!",
            "신라 황금 문화를 주제로 친구들과 짧은 소개 영상을 만들어 보세요!",
            "신라 왕릉(천마총·황남대총)을 한 곳 골라 미니 여행 코스를 만들어 보세요!",
            "신라 장신구 패턴을 활용해 나만의 디자인 카드를 만들어 보세요!",
            "신라의 화려한 공예 문화를 친구에게 추천하는 한 줄 큐레이션을 작성해 보세요!",
          ],
          "고구려 역동형": [
            "고구려 고분 벽화(수렵도·사신도)를 비교해 좋아하는 장면을 골라 그려 보세요!",
            "광개토대왕릉비 이야기를 친구들에게 설명하는 미니 발표에 도전해 보세요!",
            "고구려의 기마 문화를 다이내믹한 굿즈 아이디어로 정리해 보세요!",
            "고구려 무사·기마 이야기를 짧은 웹툰이나 만화로 그려 보세요!",
            "고구려 유물 중 가장 인상 깊은 1점을 골라 SNS 큐레이션 카드를 만들어 보세요!",
          ],
          "백제 우아형": [
            "백제 금동대향로의 무늬를 따라 그려 나만의 향낭 디자인을 만들어 보세요!",
            "공주·부여 백제 문화유적지를 골라 미니 여행 코스를 짜 보세요!",
            "백제 공예(반가사유상·관식)의 곡선미를 분석한 감상문을 써 보세요!",
            "백제 유물 굿즈 아이디어 3가지를 정리해 친구에게 제안해 보세요!",
            "백제 문화를 한 줄로 표현하는 큐레이션 문구를 만들어 보세요!",
          ],
          "조선 절제형": [
            "백자 달항아리의 곡선을 따라 그리며 절제미 감상문을 써 보세요!",
            "훈민정음 해례본을 직접 따라 써 보는 손글씨 챌린지에 도전해 보세요!",
            "조선의 과학기구(앙부일구·측우기)를 조사해 작동 원리를 정리해 보세요!",
            "백자·기록유산을 활용한 깔끔한 문구류 굿즈 아이디어를 그려 보세요!",
            "조선 기록문화를 활용해 '나의 하루 기록 일지'를 만들어 보세요!",
          ],
        };

        /* [미리 가이드] 학생들이 직접 실천제안을 수정하거나 추가하고 싶다면?
           위의 각 유형 배열 문장 끝에 쉼표(,)를 붙이고 "원하는 문장"을 추가해보라고 안내해주세요! */

        /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           [학습포인트 주석 - 무작위 추출 함수]
           - Math.random()은 0 이상 1 미만의 소수를 반환합니다.
           - 여기에 배열의 길이(list.length = 5)를 곱하면 0.0 ~ 4.999... 사이의 값이 나옵니다.
           - Math.floor()는 소수점 아래를 버려서 0, 1, 2, 3, 4 중 하나의 정수(인덱스)를 만듭니다.
           ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
        function getRandomSuggestion(type) {
          const list = SUGGESTIONS[type];
          const idx = Math.floor(Math.random() * list.length);
          return list[idx];
        }

        // 전체 결과 고정 데이터 유형 정의 (한 글자도 수정 없음)
        const RESULT_DATA = {
            "신라 화려형": {
                emoji: "👑",
                desc: "금관과 장신구처럼 화려하고 정교한 아름다움에 끌리는 타입입니다.",
                feature: "황금 문화, 불교문화, 왕릉 문화, 정교한 금속 공예",
                heritage: "금관총 금관, 천마총 금관, 천마총 금제 허리띠, 경주 황오동 금귀걸이",
                keywords: "#화려함 #황금문화 #왕릉문화 #정교함"
            },
            "고구려 역동형": {
                emoji: "⚔️",
                desc: "힘 있고 활동적인 분위기와 도전적인 이야기에 끌리는 타입입니다.",
                feature: "기마 문화, 고분 벽화, 강한 국방 문화, 역동적인 표현",
                heritage: "수렵도, 고구려 고분 벽화, 장군총, 광개토대왕릉비",
                keywords: "#역동성 #기상 #도전 #벽화"
            },
            "백제 우아형": {
                emoji: "🍃",
                desc: "섬세하고 세련된 공예와 조화로운 아름다움에 끌리는 타입입니다.",
                feature: "세련된 공예 문화, 불교 예술, 부드럽고 우아한 조형미",
                heritage: "백제 금동대향로, 무령왕릉 석수, 무령왕 금제 관식, 부여 정림사지 오층석탑",
                keywords: "#우아함 #세련미 #공예 #조화"
            },
            "조선 절제형": {
                emoji: "🌿",
                desc: "단정하고 실용적이며 오래 보아도 질리지 않는 아름다움에 끌리는 타입입니다.",
                feature: "유교 문화, 기록 문화, 과학기술, 절제된 생활미",
                heritage: "백자 달항아리, 훈민정음 해례본, 앙부일구, 측우기",
                keywords: "#절제미 #기록문화 #실용성 #단정함"
            }
        };

        // 결과 계산 및 출력 함수
        function calculateResult() {
            const form = document.getElementById('quiz-form');
            
            // 모든 문항 응답 여부 검사
            const q1 = form.elements['q1'].value;
            const q2 = form.elements['q2'].value;
            const q3 = form.elements['q3'].value;
            const q4 = form.elements['q4'].value;
            const q5 = form.elements['q5'].value;

            if (!q1 || !q2 || !q3 || !q4 || !q5) {
                alert("답변을 선택해 주세요.");
                return;
            }

            // 점수 계산용 객체 초기화
            const scores = {
                "신라 화려형": 0,
                "고구려 역동형": 0,
                "백제 우아형": 0,
                "조선 절제형": 0
            };

            // 선택값 누적
            scores[q1]++;
            scores[q2]++;
            scores[q3]++;
            scores[q4]++;
            scores[q5]++;

            /* 동점 시 우선순위 규칙 적용: 신라 → 고구려 → 백제 → 조선 순서 */
            const priorityOrder = ["신라 화려형", "고구려 역동형", "백제 우아형", "조선 절제형"];
            let highestType = priorityOrder[0];
            let maxScore = scores[highestType];

            for (let i = 1; i < priorityOrder.length; i++) {
                const currentType = priorityOrder[i];
                // > 기호를 사용하여 부등호가 같을 때(동점일 때)는 먼저 선점된(앞 순위) 유형이 유지되도록 설정합니다.
                if (scores[currentType] > maxScore) {
                    maxScore = scores[currentType];
                    highestType = currentType;
                }
            }

            // 결과 데이터 가져오기
            const data = RESULT_DATA[highestType];
            
            // 결과 화면 데이터 바인딩 (9단계 순서 및 사양 절대 준수)
            document.getElementById('result-emoji').innerText = data.emoji;
            document.getElementById('result-type').innerText = data.emoji + " " + highestType;
            document.getElementById('result-description').innerText = data.desc;
            document.getElementById('result-feature').innerText = "📜 역사 특징: " + data.feature;
            document.getElementById('result-heritage').innerText = "🏛️ 대표 문화유산: " + data.heritage;
            document.getElementById('result-keywords').innerText = data.keywords;
            
            // ⑧ 💡 실천제안 (라벨 그대로 사용 및 다시하기 시 재호출되도록 처리)
            const randomSuggestion = getRandomSuggestion(highestType);
            document.getElementById('result-suggestion').innerText = "💡 실천제안: " + randomSuggestion;

            // 결과 화면 보이기
            document.getElementById('result-section').style.display = 'block';
            
            // 결과 화면으로 부드럽게 스크롤 이동
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
        }

        // 다시 하기 기능 함수
        function resetQuiz() {
            // 1. 라디오 버튼 선택값 초기화
            document.getElementById('quiz-form').reset();
            // 2. 결과 영역 다시 숨기기
            document.getElementById('result-section').style.display = 'none';
            // 3. 최상단으로 스크롤 이동
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
