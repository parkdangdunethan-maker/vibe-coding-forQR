<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <!-- 모바일 안전 1: 화면 크기에 맞게 페이지가 보이도록 설정합니다. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>🏺 내가 끌리는 역사 감성 찾기</title>

  <style>
    /* 모바일 안전 2: 모든 요소의 크기 계산을 쉽게 만들어 줍니다. */
    * {
      box-sizing: border-box;
    }

    /* 모바일 안전 2: 화면이 옆으로 밀리지 않도록 합니다. */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
      word-break: keep-all;
    }

    /* 이번 단계에서는 디자인용 CSS를 최소한만 사용합니다. */
    body {
      font-family: sans-serif;
      line-height: 1.6;
      padding: 16px;
    }

    img {
      max-width: 100%;
    }

    .emoji-result {
      font-size: 70px;
    }
  </style>
</head>

<body>
  <!-- 제목 영역 -->
  <header>
    <h1>🏺 내가 끌리는 역사 감성 찾기</h1>
    <p>내가 가장 끌리는 역사 감성은 무엇일까요? 아래의 질문에 답하고 나의 역사 감성을 알아보아요!</p>
  </header>

  <!-- 
    form 태그는 여러 입력 요소를 묶을 때 사용합니다.
    여기서는 Q1~Q5 라디오 버튼을 하나로 묶어 줍니다.
  -->
  <form id="historyForm">
    <!-- Q1 -->
    <section>
      <h2>Q1. 더 끌리는 역사 유물의 특징은?</h2>

      <!-- 
        같은 질문의 라디오 버튼은 name 속성을 같게 해야 합니다.
        그래야 4개 중 1개만 선택됩니다.
      -->
      <label>
        <input type="radio" name="q1" value="신라 화려형">
        ① 금빛 장신구처럼 화려하고 정교한 유물 👑
      </label>
      <br>

      <label>
        <input type="radio" name="q1" value="고구려 역동형">
        ② 고분 벽화처럼 힘차고 역동적인 표현 ⚔️
      </label>
      <br>

      <label>
        <input type="radio" name="q1" value="백제 우아형">
        ③ 금동대향로처럼 섬세하고 우아한 공예 🍃
      </label>
      <br>

      <label>
        <input type="radio" name="q1" value="조선 절제형">
        ④ 백자처럼 절제되고 실용적인 아름다움 🌿
      </label>
    </section>

    <!-- Q2 -->
    <section>
      <h2>Q2. 박물관에서 가장 오래 보고 싶은 전시는?</h2>

      <label>
        <input type="radio" name="q2" value="신라 화려형">
        ① 금관, 금제 허리띠 등 반짝이는 장신구 전시 ✨
      </label>
      <br>

      <label>
        <input type="radio" name="q2" value="고구려 역동형">
        ② 수렵도, 사신도처럼 움직임이 느껴지는 고분 벽화 전시 🐎
      </label>
      <br>

      <label>
        <input type="radio" name="q2" value="백제 우아형">
        ③ 향로, 관식, 석수처럼 섬세한 공예품 전시 🎨
      </label>
      <br>

      <label>
        <input type="radio" name="q2" value="조선 절제형">
        ④ 백자, 기록유산, 과학기구처럼 쓰임이 분명한 유물 전시 📚
      </label>
    </section>

    <!-- Q3 -->
    <section>
      <h2>Q3. 내가 더 가지고 싶은 굿즈는?</h2>

      <label>
        <input type="radio" name="q3" value="신라 화려형">
        ① 금관 무늬를 활용한 화려한 액세서리 💎
      </label>
      <br>

      <label>
        <input type="radio" name="q3" value="고구려 역동형">
        ② 고구려 벽화 속 말과 인물을 활용한 다이내믹 굿즈 🛡️
      </label>
      <br>

      <label>
        <input type="radio" name="q3" value="백제 우아형">
        ③ 백제 문양을 활용한 우아한 향낭이나 공예 소품 🍶
      </label>
      <br>

      <label>
        <input type="radio" name="q3" value="조선 절제형">
        ④ 백자와 한글을 활용한 깔끔한 문구류 ✍️
      </label>
    </section>

    <!-- Q4 -->
    <section>
      <h2>Q4. 더 가보고 싶은 역사 공간은?</h2>

      <label>
        <input type="radio" name="q4" value="신라 화려형">
        ① 신라 금관과 왕릉 문화를 볼 수 있는 경주 🏺
      </label>
      <br>

      <label>
        <input type="radio" name="q4" value="고구려 역동형">
        ② 고구려 고분 벽화와 광개토대왕릉비를 떠올릴 수 있는 전시관 🐎
      </label>
      <br>

      <label>
        <input type="radio" name="q4" value="백제 우아형">
        ③ 백제 문화유산과 공예의 아름다움을 볼 수 있는 공주·부여 🏛️
      </label>
      <br>

      <label>
        <input type="radio" name="q4" value="조선 절제형">
        ④ 궁궐, 서원, 기록문화를 함께 볼 수 있는 조선 역사 공간 🌿
      </label>
    </section>

    <!-- Q5 -->
    <section>
      <h2>Q5. 내가 더 좋아하는 활동은?</h2>

      <label>
        <input type="radio" name="q5" value="신라 화려형">
        ① 눈에 띄는 문양과 색으로 꾸미기 ✨
      </label>
      <br>

      <label>
        <input type="radio" name="q5" value="고구려 역동형">
        ② 넓은 무대에서 힘차게 움직이며 탐험하기 🚀
      </label>
      <br>

      <label>
        <input type="radio" name="q5" value="백제 우아형">
        ③ 섬세한 문양을 관찰하고 직접 만들어 보기 🎨
      </label>
      <br>

      <label>
        <input type="radio" name="q5" value="조선 절제형">
        ④ 내용을 기록하고 의미를 차분히 정리하기 📖
      </label>
    </section>

    <br>

    <!-- type="button"은 버튼을 눌러도 form이 새로고침되지 않게 합니다. -->
    <button type="button" onclick="showResult()">📊 나의 역사 감성 알아보기</button>
  </form>

  <!-- 결과가 표시될 영역입니다. 처음에는 비어 있습니다. -->
  <div id="resultArea"></div>

  <footer>
    <p>AI의 도움을 받아 제작된 콘텐츠입니다.</p>
  </footer>

  <script>
    /*
      SUGGESTIONS는 객체입니다.
      객체는 이름표가 붙은 여러 데이터를 묶어 저장할 수 있습니다.

      아래 객체 안에는 4개의 배열이 들어 있습니다.
      배열은 여러 문장을 순서대로 저장하는 상자입니다.

      예시:
      SUGGESTIONS["신라 화려형"]은 신라 화려형 실천제안 5개가 들어 있는 배열입니다.

      학생 활동:
      각 배열 안에 새로운 실천제안 문장을 추가해 볼 수 있습니다.
      단, 문장을 추가할 때는 쉼표(,)를 잊지 않도록 주의하세요.
    */
    const SUGGESTIONS = {
      "신라 화려형": [
        "경주 박물관의 금관·금제 허리띠를 골라 굿즈 디자인 아이디어를 그려 보세요!",
        "신라 황금 문화를 주제로 친구들과 짧은 소개 영상을 만들어 보세요!",
        "신라 왕릉(천마총·황남대총)을 한 곳 골라 미니 여행 코스를 만들어 보세요!",
        "신라 장신구 패턴을 활용해 나만의 디자인 카드를 만들어 보세요!",
        "신라의 화려한 공예 문화를 친구에게 추천하는 한 줄 큐레이션을 작성해 보세요!",
      ],
      "고구려 역동형": [
        "고구려 고분 벽화(수렵도·사신도)를 비교해 좋아하는 장면을 골라 그려 보세요!",
        "광개토대왕릉비 이야기를 친구들에게 설명하는 미니 발표에 도전해 보세요!",
        "고구려의 기마 문화를 다이내믹한 굿즈 아이디어로 정리해 보세요!",
        "고구려 무사·기마 이야기를 짧은 웹툰이나 만화로 그려 보세요!",
        "고구려 유물 중 가장 인상 깊은 1점을 골라 SNS 큐레이션 카드를 만들어 보세요!",
      ],
      "백제 우아형": [
        "백제 금동대향로의 무늬를 따라 그려 나만의 향낭 디자인을 만들어 보세요!",
        "공주·부여 백제 문화유적지를 골라 미니 여행 코스를 짜 보세요!",
        "백제 공예(반가사유상·관식)의 곡선미를 분석한 감상문을 써 보세요!",
        "백제 유물 굿즈 아이디어 3가지를 정리해 친구에게 제안해 보세요!",
        "백제 문화를 한 줄로 표현하는 큐레이션 문구를 만들어 보세요!",
      ],
      "조선 절제형": [
        "백자 달항아리의 곡선을 따라 그리며 절제미 감상문을 써 보세요!",
        "훈민정음 해례본을 직접 따라 써 보는 손글씨 챌린지에 도전해 보세요!",
        "조선의 과학기구(앙부일구·측우기)를 조사해 작동 원리를 정리해 보세요!",
        "백자·기록유산을 활용한 깔끔한 문구류 굿즈 아이디어를 그려 보세요!",
        "조선 기록문화를 활용해 '나의 하루 기록 일지'를 만들어 보세요!",
      ],
    };

    /*
      getRandomSuggestion 함수는 유형 이름을 받아서
      해당 유형의 실천제안 중 1개를 무작위로 골라 반환합니다.

      Math.random()은 0 이상 1 미만의 무작위 숫자를 만듭니다.
      Math.floor()는 소수점을 버리고 정수로 만듭니다.

      예를 들어 배열의 길이가 5라면,
      Math.random() * 5는 0 이상 5 미만의 숫자가 됩니다.
      Math.floor()를 사용하면 0, 1, 2, 3, 4 중 하나가 됩니다.
      배열의 번호는 0부터 시작하므로 이 번호로 제안을 고를 수 있습니다.
    */
    function getRandomSuggestion(type) {
      const list = SUGGESTIONS[type];
      const idx = Math.floor(Math.random() * list.length);
      return list[idx];
    }

    /*
      RESULT_DATA 객체에는 결과 화면에 보여 줄 정보가 들어 있습니다.
      유형명으로 데이터를 찾을 수 있게 만들었습니다.
    */
    const RESULT_DATA = {
      "신라 화려형": {
        emoji: "👑",
        title: "신라 화려형",
        description: "금관과 장신구처럼 화려하고 정교한 아름다움에 끌리는 타입입니다.",
        feature: "황금 문화, 불교문화, 왕릉 문화, 정교한 금속 공예",
        heritage: "금관총 금관, 천마총 금관, 천마총 금제 허리띠, 경주 황오동 금귀걸이",
        keywords: "#화려함 #황금문화 #왕릉문화 #정교함"
      },
      "고구려 역동형": {
        emoji: "⚔️",
        title: "고구려 역동형",
        description: "힘 있고 활동적인 분위기와 도전적인 이야기에 끌리는 타입입니다.",
        feature: "기마 문화, 고분 벽화, 강한 국방 문화, 역동적인 표현",
        heritage: "수렵도, 고구려 고분 벽화, 장군총, 광개토대왕릉비",
        keywords: "#역동성 #기상 #도전 #벽화"
      },
      "백제 우아형": {
        emoji: "🍃",
        title: "백제 우아형",
        description: "섬세하고 세련된 공예와 조화로운 아름다움에 끌리는 타입입니다.",
        feature: "세련된 공예 문화, 불교 예술, 부드럽고 우아한 조형미",
        heritage: "백제 금동대향로, 무령왕릉 석수, 무령왕 금제 관식, 부여 정림사지 오층석탑",
        keywords: "#우아함 #세련미 #공예 #조화"
      },
      "조선 절제형": {
        emoji: "🌿",
        title: "조선 절제형",
        description: "단정하고 실용적이며 오래 보아도 질리지 않는 아름다움에 끌리는 타입입니다.",
        feature: "유교 문화, 기록 문화, 과학기술, 절제된 생활미",
        heritage: "백자 달항아리, 훈민정음 해례본, 앙부일구, 측우기",
        keywords: "#절제미 #기록문화 #실용성 #단정함"
      }
    };

    /*
      PRIORITY 배열은 동점일 때 우선순위를 정하기 위해 사용합니다.
      신라 → 고구려 → 백제 → 조선 순서입니다.
    */
    const PRIORITY = [
      "신라 화려형",
      "고구려 역동형",
      "백제 우아형",
      "조선 절제형"
    ];

    /*
      showResult 함수는 버튼을 클릭했을 때 실행됩니다.
      1. 모든 문항에 답했는지 확인합니다.
      2. 점수를 계산합니다.
      3. 최고 점수 유형을 찾습니다.
      4. 결과를 화면에 출력합니다.
    */
    function showResult() {
      const scores = {
        "신라 화려형": 0,
        "고구려 역동형": 0,
        "백제 우아형": 0,
        "조선 절제형": 0
      };

      /*
        for 반복문은 같은 일을 여러 번 할 때 사용합니다.
        여기서는 q1부터 q5까지 차례대로 확인합니다.
      */
      for (let i = 1; i <= 5; i++) {
        const selected = document.querySelector('input[name="q' + i + '"]:checked');

        /*
          selected가 없다는 것은 해당 질문에 답하지 않았다는 뜻입니다.
          하나라도 답하지 않으면 alert를 보여 주고 함수를 멈춥니다.
        */
        if (!selected) {
          alert("답변을 선택해 주세요.");
          return;
        }

        /*
          선택한 보기의 value에는 유형명이 들어 있습니다.
          선택된 유형의 점수를 1점 올립니다.
        */
        scores[selected.value] = scores[selected.value] + 1;
      }

      /*
        최고 점수 유형을 찾습니다.
        동점일 경우 PRIORITY 배열 순서대로 먼저 나온 유형이 선택됩니다.
      */
      let finalType = PRIORITY[0];
      let highestScore = scores[finalType];

      for (let i = 1; i < PRIORITY.length; i++) {
        const type = PRIORITY[i];

        if (scores[type] > highestScore) {
          finalType = type;
          highestScore = scores[type];
        }
      }

      /*
        최종 유형에 맞는 결과 데이터를 가져옵니다.
      */
      const result = RESULT_DATA[finalType];

      /*
        함수 호출과 반환값 사용:
        getRandomSuggestion(finalType)을 호출하면
        최종 유형에 맞는 실천제안 1개가 돌아옵니다.
      */
      const suggestion = getRandomSuggestion(finalType);

      /*
        innerHTML은 HTML 내용을 화면에 넣을 때 사용합니다.
        결과 영역에 결과 내용을 한 번에 넣어 줍니다.
      */
      document.getElementById("resultArea").innerHTML = `
        <hr>
        <section>
          <h2>📊 나의 역사 감성 결과</h2>
          <div class="emoji-result">${result.emoji}</div>
          <h3>${result.title}</h3>

          <h4>어떤 역사 감성일까?</h4>
          <p>${result.description}</p>

          <h4>역사 특징</h4>
          <p>${result.feature}</p>

          <h4>대표 문화유산</h4>
          <p>${result.heritage}</p>

          <h4>💡 실천제안</h4>
          <p>${suggestion}</p>

          <h4>강점 키워드</h4>
          <p>${result.keywords}</p>

          <button type="button" onclick="resetQuiz()">🔄 다시 하기</button>
        </section>
      `;
    }

    /*
      resetQuiz 함수는 다시 하기 버튼을 눌렀을 때 실행됩니다.
      선택한 라디오 버튼과 결과 영역을 초기화합니다.
    */
    function resetQuiz() {
      document.getElementById("historyForm").reset();
      document.getElementById("resultArea").innerHTML = "";
    }
  </script>
</body>
</html>
