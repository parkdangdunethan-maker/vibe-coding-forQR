<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 나의 지구 수호대 유형 찾기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">

    <style>
        /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           [학생 커스터마이징 슬롯]
           - [분위기]: 아기자기하고 친근한 환경 교육 톤
           - [색감]: 지구와 자연을 닮은 그린(Green) 및 스카이블루 테마
           - [폰트]: Jua (메인 타이틀/버튼) & Gowun Dodum (본문)
           ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
        :root {
            --primary-color: #2ec4b6;
            --primary-hover: #0cbaba;
            --bg-color: #f0fdf4;
            --text-main: #2d3748;
            --text-muted: #718096;
            --card-border: #e5e5e5;
            --accent-bg: #fef3c7; /* 실천제안 강조 박스용 배경 (노란/연두) */
            --accent-border: #f59e0b;
        }

        /* [모바일 안전 규칙 2] 초기화 및 가독성 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            word-break: keep-all;
            line-height: 1.6;
            letter-spacing: -0.2px;
            background-color: var(--bg-color);
            font-family: 'Gowun Dodum', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 🚨🚨 카드 박스 절대 고정 규칙 준수 🚨🚨 */
        .app-card {
            width: 100%;
            max-width: 420px;
            height: 580px;                  /* 🚨 모든 화면 동일 */
            padding: 24px 20px;             /* 🚨 모든 화면 동일 */
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin: 0 auto;
            background: #ffffff;
            position: relative;             /* 좌상단 이전 버튼 위치 기준 */
            overflow-x: hidden;             /* 🚨 가로 스크롤 무조건 차단 */
            overflow-y: auto;               /* 🚨 세로 스크롤은 가능하되 스크롤바만 숨김 */
            scrollbar-width: none;          /* Firefox: 스크롤바 숨김 */
            -ms-overflow-style: none;       /* IE/Edge(구버전): 스크롤바 숨김 */
            display: flex;                  /* 내부 화면 정렬용 */
            flex-direction: column;
        }

        .app-card::-webkit-scrollbar {
            display: none;                  /* Chrome / Safari / Edge: 스크롤바 숨김 */
            width: 0;
            height: 0;
        }

        /* 🚨 flex 레이아웃 — 화면별 공통 베이스 */
        #start-screen, #question-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 14px;
            justify-content: flex-start;
        }

        /* 슬라이드 애니메이션 효과를 위한 컨테이너 */
        .slide-container {
            transition: transform 0.25s ease-in-out, opacity 0.25s ease-in-out;
        }

        /* 🚨 버튼 뭉개짐 방지 규칙 준수 */
        .main-btn {
            width: 100%;
            min-height: 52px;               /* 🚨 height 대신 min-height 사용 */
            flex-shrink: 0;                /* 🚨 절대 줄어들지 않게 */
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Jua', sans-serif;
            cursor: pointer;
            margin-top: auto;              /* 🚨 카드 하단에 자연스럽게 정착 */
            background-color: var(--primary-color);
            color: white;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
        }

        .main-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);   /* 🚨 미세 효과만 허용 (영역 탈출 방지) */
        }

        /* [시작 화면] 스타일 */
        .title-area {
            text-align: center;
            margin-top: 40px;
        }
        .title-area h1 {
            font-family: 'Jua', sans-serif;
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .title-area p {
            font-size: 15px;
            color: var(--text-main);
            padding: 0 10px;
        }

        /* [질문 화면] 상단 진행률 및 이전 버튼 */
        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 40px;
            margin-bottom: 10px;
            position: relative;
        }

        /* 이전 버튼 (좌상단 화살표) 고정 크기 규칙 */
        .back-btn {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-container {
            flex-grow: 1;
            margin-left: 45px;
            text-align: right;
        }

        .progress-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: #edf2f7;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 20%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        /* 🚨 선택지 컨테이너 필수 gap 규격 적용 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;                     /* 🚨 선택지 간격 필수 지정 */
        }

        /* 선택지 카드 기본 커스텀 스타일 */
        .option-card {
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid var(--card-border);
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background-color 0.2s, border-color 0.2s;
            background-color: #ffffff;
        }

        /* 🚨 transform: scale() 배제, 테두리와 배경색 변화만 사용 */
        .option-card:hover {
            border-color: var(--primary-color);
            background-color: #f6fefc;
        }

        .option-card input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .option-card span {
            font-size: 14px;
            user-select: none;
        }

        /* 🚨 [결과 화면 정렬] */
        #result-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;                      /* 🚨 콘텐츠 축소를 위해 살짝 좁게 조절 */
            overflow-y: auto;               /* 🚨 결과뷰 스크롤바 제어 설정 */
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #result-screen::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        .result-header-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--text-muted);
            text-align: center;
        }

        /* ① 유형 이모지 (80~100px 규칙 준수) */
        #result-emoji {
            font-size: 90px;
            line-height: 1;
            margin: 5px 0;
            text-align: center;
        }

        /* ② 유형명 (28px bold 규칙 준수) */
        #result-title {
            font-family: 'Jua', sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: var(--text-main);
            text-align: center;
        }

        .result-keywords {
            font-size: 14px;
            color: var(--primary-color);
            font-weight: bold;
            text-align: center;
        }

        /* ③ 어떤 성향일까? (회색 박스 규칙 준수) */
        #result-description {
            width: 100%;
            background-color: #f7fafc;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
        }

        /* ④ 💡 실천제안 (강조 박스 규칙 준수) */
        .suggestion-box {
            width: 100%;
            background-color: var(--accent-bg);
            border: 1px solid var(--accent-border);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
        }

        .suggestion-box span {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            color: #b45309;
        }

        #result-suggestion {
            color: #1e293b;
            font-weight: 500;
        }

        /* 하단 카피라이트 푸터 */
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-card">

        <div id="start-screen">
            <div class="title-area">
                <h1>🌍 나의 지구 수호대<br>유형 찾기</h1>
                <p>내가 생각하는 가장 중요한 환경 가치는 무엇일까요? 아래의 질문에 답하고 나의 지구 수호대 유형을 알아보아요!</p>
            </div>
            <button type="button" class="main-btn" onclick="startQuiz()">🚀 나의 지구 수호대 유형 알아보기</button>
        </div>

        <div id="question-screen" style="display: none;" class="slide-container">
            <div class="nav-header">
                <button type="button" id="back-btn" class="back-btn" onclick="goPrev()">⬅️</button>
                <div class="progress-container">
                    <div id="progress-text" class="progress-text">Q1 / 5</div>
                    <div class="progress-bar-bg">
                        <div id="progress-bar-fill" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>

            <form id="quiz-form" onsubmit="return false;">
                <div id="dynamic-question-area">
                    </div>
            </form>

            <button type="button" id="next-submit-btn" class="main-btn" onclick="goNext()">다음 질문으로 ➡️</button>
        </div>

        <div id="result-screen" style="display: none;">
            <div class="result-header-title">📊 나의 지구 수호대 유형 결과</div>
            
            <div id="result-emoji">🌱</div>
            
            <h3 id="result-title">생활 실천가</h3>
            
            <div id="result-keywords" class="result-keywords">#실천 #책임감</div>
            
            <div id="result-description"></div>
            
            <div class="suggestion-box">
                <span>💡 실천제안</span>
                <div id="result-suggestion"></div>
            </div>

            <button type="button" class="main-btn" onclick="resetQuiz()">🔄 다시 하기</button>
        </div>

    </div>

    <footer>AI의 도움을 받아 제작된 콘텐츠입니다.</footer>

    <script>
        // 🚨 [데이터 풀 보존] 20개 실천제안 데이터 배열 변경 금지
        const SUGGESTIONS = {
          "생활 실천가": [
            "오늘 점심부터 잔반 제로에 도전해 보세요!",
            "양치할 때 컵을 사용해 하루 약 6L의 물을 아껴 보세요!",
            "안 쓰는 콘센트는 뽑아두는 작은 습관을 시작해 보세요!",
            "텀블러를 일주일만 들고 다니는 챌린지에 도전해 보세요!",
            "오늘 하루 분리수거 라벨을 떼고 버리는 1초 습관을 만들어 보세요!",
          ],
          "변화 이끔이": [
            "친구들과 함께 학교 분리수거함 디자인을 바꿔 보세요!",
            "우리 반에 '플라스틱 없는 날'을 제안해 보세요!",
            "환경 캠페인 포스터를 만들어 SNS에 올려 보세요!",
            "친구들과 환경 동아리를 만들거나 가입해 보세요!",
            "가족 회의에서 '우리 집 친환경 규칙'을 함께 정해 보세요!",
          ],
          "아이디어 발명가": [
            "재활용 마크 인식 앱 아이디어를 그림으로 그려 보세요!",
            "태양광 충전기 키트를 직접 조립해 보세요!",
            "탄소발자국 계산기 미니 프로젝트에 도전해 보세요!",
            "친환경 신소재(바이오 플라스틱 등)를 조사해 발표해 보세요!",
            "AI로 분리수거를 도와주는 아이디어를 친구에게 설명해 보세요!",
          ],
          "자연 지킴이": [
            "주말에 동네 산책로를 천천히 걸으며 자연을 느껴 보세요!",
            "베란다나 창가에 작은 화분 하나를 키워 보세요!",
            "근처 공원이나 숲에서 '5분 자연 관찰'을 해 보세요!",
            "계절별 동식물 관찰 일기를 써 보세요!",
            "사라져가는 멸종위기종을 한 종 골라 깊이 공부해 보세요!",
          ],
        };

        /* [학습 포인트 주석]
         * - 객체와 배열의 차이: SUGGESTIONS는 중괄호{} 표기를 쓰는 '객체'이며 내부 키값에 매칭된 데이터 목록들은 대괄호[] 형태의 '배열' 구조입니다.
         * - Math.random() 과 Math.floor() 연산 조합으로 0부터 배열 총 크기 미만의 무작위 인덱스 정수를 생성합니다.
         * - 학생 가이드: 만약 나만의 기발한 실천 아이디어가 생기면 각 성향 리스트 배열 안에 문자열을 자유롭게 추가해서 확장해 보세요!
         */
        function getRandomSuggestion(type) {
          const list = SUGGESTIONS[type];
          const idx = Math.floor(Math.random() * list.length);
          return list[idx];
        }

        // 🚨 [데이터 풀 보존] 1단계 명세 기반 구조화 객체 (한 문자도 변동 없음)
        const RESULT_DATA = {
            "생활 실천가": {
                emoji: "🌱",
                keywords: "#실천 #책임감 #꾸준함 #환경습관",
                desc: "지금 당장 내가 할 수 있는 작은 행동에서 시작하는 유형이에요.<br>꾸준함과 실천력을 바탕으로 변화를 만들어낼 수 있어요."
            },
            "변화 이끔이": {
                emoji: "🤝",
                keywords: "#협력 #공감 #소통 #함께성장",
                desc: "친구들과 함께 움직이며 변화를 만들어가야 한다고 믿는 유형이에요.<br>사람들을 연결하고 협력하는 힘이 있어요."
            },
            "아이디어 발명가": {
                emoji: "💡",
                keywords: "#창의력 #발명 #문제해결 #혁신",
                desc: "기술과 새로운 아이디어로 환경 문제를 해결하고 싶은 유형이에요.<br>창의적인 생각으로 새로운 해결책을 만들어낼 수 있어요."
            },
            "자연 지킴이": {
                emoji: "🌳",
                keywords: "#자연사랑 #생태보호 #배려 #환경감수성",
                desc: "자연 그대로의 가치를 소중하게 생각하는 유형이에요.<br>생명과 환경을 소중히 여기고 보호하려는 마음이 커요."
            }
        };

        // 🚨 [텍스트 풀 보존] 1단계 명세서 원본 데이터 그대로 수록
        const QUESTION_DATA = [
            {
                id: 1,
                title: "Q1. 학교에서 환경 캠페인을 한다면 가장 하고 싶은 것은?",
                options: [
                    "① 텀블러 사용, 불 끄기 등 생활 속 작은 실천을 함께 알리는 캠페인",
                    "② 친구들과 함께 쓰레기를 줍고, 환경을 지키기 위한 약속을 만드는 활동",
                    "③ AI 분리수거 기계나 환경 보호를 위한 새로운 아이디어 제안하기",
                    "④ 학교 숲이나 꽃밭을 가꾸며 자연을 보호하는 활동"
                ]
            },
            {
                id: 2,
                title: "Q2. 바다에 플라스틱이 가득하다는 뉴스를 봤어. 가장 먼저 드는 생각은?",
                options: [
                    "① \"나부터 플라스틱 사용을 줄여야겠어.\"",
                    "② \"모두가 함께 노력해야 진짜 변화가 생길 거야.\"",
                    "③ \"플라스틱을 대신할 새로운 기술이나 발명은 없을까?\"",
                    "④ \"바다 생물과 자연을 지키는 일이 정말 중요해.\""
                ]
            },
            {
                id: 3,
                title: "Q3. 간식을 살 때 친환경 제품이 있다면 어떤 걸 고를 것 같아?",
                options: [
                    "① 포장이 적어 쓰레기를 줄일 수 있는 제품",
                    "② 환경 보호 활동에 참여하는 브랜드의 제품",
                    "③ 친환경 기술이 적용된 새로운 제품",
                    "④ 자연에서 얻은 재료로 만들어 환경 부담이 적은 제품"
                ]
            },
            {
                id: 4,
                title: "Q4. 우리 동네에 환경을 위해 딱 하나를 만든다면?",
                options: [
                    "① 분리배출에 참여하면 보상을 받을 수 있는 기계",
                    "② 주민들이 함께 참여할 수 있는 환경 마켓이나 행사",
                    "③ AI가 쓰레기를 자동으로 분류하는 스마트 시설",
                    "④ 새와 곤충이 함께 살아갈 수 있는 작은 숲이나 생태 공간"
                ]
            },
            {
                id: 5,
                title: "Q5. 깨끗한 지구를 만들기 위해 가장 중요한 것은?",
                options: [
                    "① 한 사람 한 사람의 꾸준한 실천",
                    "② 모두가 함께 지키려는 약속과 협력",
                    "③ 더 나은 기술과 새로운 발명",
                    "④ 자연을 있는 그대로 소중히 여기는 마음"
                ]
            }
        ];

        let currentIdx = 0; // 현재 진행 중인 질문 인덱스 (0 ~ 4)
        let userAnswers = {}; // 학생이 고른 정답값을 기억하는 임시 저장소

        // 싱글 페이지 애플리케이션(SPA) 구동 시작 함수
        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            currentIdx = 0;
            renderQuestion();
        }

        // 질문 카드를 동적으로 화면에 그리는 렌더링 함수
        function renderQuestion() {
            const data = QUESTION_DATA[currentIdx];
            const area = document.getElementById('dynamic-question-area');
            
            // [모바일 안전 규칙 3] 상단 화살표 처리 (첫 문항인 Q1에서는 숨김)
            const backBtn = document.getElementById('back-btn');
            if (currentIdx === 0) {
                backBtn.style.visibility = 'hidden';
            } else {
                backBtn.style.visibility = 'visible';
            }

            // 게이지 및 상단 텍스트 정보 업데이트
            document.getElementById('progress-text').innerText = `Q${data.id} / 5`;
            document.getElementById('progress-bar-fill').style.width = `${(data.id / 5) * 100}%`;

            // HTML 노드 주입 구조 (1단계 폼 양식 계승)
            let html = `<div class="question-text">${data.title}</div>`;
            html += `<div class="options">`;
            
            for(let i = 0; i < data.options.length; i++) {
                const checkedStr = (userAnswers[currentIdx] === String(i + 1)) ? 'checked' : '';
                html += `
                    <label class="option-card" onclick="selectRadio(this)">
                        <input type="radio" name="q${data.id}" value="${i + 1}" ${checkedStr} onclick="event.stopPropagation();">
                        <span>${data.options[i]}</span>
                    </label>
                `;
            }
            html += `</div>`;
            area.innerHTML = html;

            // 🚨 [버튼 라벨 통일 규칙 확인 및 조절]
            const mainBtn = document.getElementById('next-submit-btn');
            if (currentIdx === 4) {
                mainBtn.innerText = "📊 나의 지구 수호대 유형 알아보기";
            } else {
                mainBtn.innerText = "다음 질문으로 ➡️";
            }
        }

        // 카드 클릭 시 내부 라디오 박스 선택 동기화 함수
        function selectRadio(element) {
            const radio = element.querySelector('input[type="radio"]');
            radio.checked = true;
        }

        // [다음 질문으로 ➡️] 처리 및 정답 유효성 검사 함수
        function goNext() {
            const currentQuestion = QUESTION_DATA[currentIdx];
            const checkedOption = document.querySelector(`input[name="q${currentQuestion.id}"]:checked`);
            
            if (!checkedOption) {
                alert("답변을 선택해 주세요.");
                return;
            }

            // 고른 답변 기록
            userAnswers[currentIdx] = checkedOption.value;

            // 슬라이딩 효과 연출을 위한 애니메이션 분기
            const screen = document.getElementById('question-screen');
            screen.style.opacity = '0';
            screen.style.transform = 'translateX(-15px)';

            setTimeout(() => {
                if (currentIdx < 4) {
                    currentIdx++;
                    renderQuestion();
                    screen.style.transform = 'translateX(15px)';
                    setTimeout(() => {
                        screen.style.opacity = '1';
                        screen.style.transform = 'translateX(0)';
                    }, 50);
                } else {
                    // 마지막 5번째 문항 완료 시 즉시 결과 연산 진입
                    calculateResult();
                }
            }, 200);
        }

        // [이전 버튼] 구현 함수
        function goPrev() {
            if (currentIdx > 0) {
                const screen = document.getElementById('question-screen');
                screen.style.opacity = '0';
                screen.style.transform = 'translateX(15px)';

                setTimeout(() => {
                    currentIdx--;
                    renderQuestion();
                    screen.style.transform = 'translateX(-15px)';
                    setTimeout(() => {
                        screen.style.opacity = '1';
                        screen.style.transform = 'translateX(0)';
                    }, 50);
                }, 200);
            }
        }

        // 🚨 [점수 규칙 로직 보존] 타기 기록 누적 알고리즘 원형 보존
        function calculateResult() {
            const scores = {
                "생활 실천가": 0,
                "변화 이끔이": 0,
                "아이디어 발명가": 0,
                "自然_보호": 0 // 내부 수치용 명칭
            };
            // 원본 식별자와 최종 키매핑 일치화 조절
            scores["자연 지킴이"] = 0;

            let currentWinner = "생활 실천가";
            let maxScore = 0;

            function addScore(type, amount) {
                scores[type] += amount;
                // 동점 시 먼저 최고 점수에 도달한 유형 우선 규칙 보존
                if (scores[type] > maxScore) {
                    maxScore = scores[type];
                    currentWinner = type;
                }
            }

            const v1 = userAnswers[0];
            const v2 = userAnswers[1];
            const v3 = userAnswers[2];
            const v4 = userAnswers[3];
            const v5 = userAnswers[4];

            // Q1 가중치 규칙
            if (v1 === "1") { addScore("생활 실천가", 2); addScore("자연 지킴이", 1); }
            else if (v1 === "2") { addScore("변화 이끔이", 2); addScore("생활 실천가", 1); }
            else if (v1 === "3") { addScore("아이디어 발명가", 2); addScore("변화 이끔이", 1); }
            else if (v1 === "4") { addScore("자연 지킴이", 2); addScore("아이디어 발명가", 1); }

            // Q2 가중치 규칙
            if (v2 === "1") { addScore("생활 실천가", 2); addScore("자연 지킴이", 1); }
            else if (v2 === "2") { addScore("변화 이끔이", 2); addScore("아이디어 발명가", 1); }
            else if (v2 === "3") { addScore("아이디어 발명가", 2); addScore("변화 이끔이", 1); }
            else if (v2 === "4") { addScore("자연 지킴이", 2); addScore("생활 실천가", 1); }

            // Q3 가중치 규칙
            if (v3 === "1") { addScore("생활 실천가", 2); addScore("자연 지킴이", 1); }
            else if (v3 === "2") { addScore("변화 이끔이", 2); addScore("생활 실천가", 1); }
            else if (v3 === "3") { addScore("아이디어 발명가", 2); addScore("변화 이끔이", 1); }
            else if (v3 === "4") { addScore("자연 지킴이", 2); addScore("아이디어 발명가", 1); }

            // Q4 가중치 규칙
            if (v4 === "1") { addScore("생활 실천가", 2); addScore("자연 지킴이", 1); }
            else if (v4 === "2") { addScore("변화 이끔이", 2); addScore("생활 실천가", 1); }
            else if (v4 === "3") { addScore("아이디어 발명가", 2); addScore("변화 이끔이", 1); }
            else if (v4 === "4") { addScore("자연 지킴이", 2); addScore("아이디어 발명가", 1); }

            // Q5 가중치 규칙
            if (v5 === "1") { addScore("생활 실천가", 2); addScore("자연 지킴이", 1); }
            else if (v5 === "2") { addScore("변화 이끔이", 2); addScore("생활 실천가", 1); }
            else if (v5 === "3") { addScore("아이디어 발명가", 2); addScore("변화 이끔이", 1); }
            else if (v5 === "4") { addScore("자연 지킴이", 2); addScore("아이디어 발명가", 1); }

            const finalType = currentWinner;
            const data = RESULT_DATA[finalType];

            // UI 바인딩 가동
            document.getElementById('result-emoji').innerText = data.emoji;
            document.getElementById('result-title').innerText = finalType;
            document.getElementById('result-keywords').innerText = data.keywords;
            document.getElementById('result-description').innerHTML = data.desc;
            
            // 매 회차 랜덤 호출 적용
            document.getElementById('result-suggestion').innerText = getRandomSuggestion(finalType);

            // 최종 전환 출력
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
        }

        // 🚨 [다시 하기] 내부 상태 완벽 리셋 기능 처리 함수
        function resetQuiz() {
            userAnswers = {};
            currentIdx = 0;
            
            // Form 초기화
            document.getElementById('quiz-form').reset();
            
            // 화면 노드 교체 및 복구
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
