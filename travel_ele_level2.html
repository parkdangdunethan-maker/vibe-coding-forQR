<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 스타일 알아보기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        /* [모바일 안전 세트 2 & 모바일 가독성] */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            max-width: 100%;
            overflow-x: hidden;
            word-break: keep-all;
            line-height: 1.6;
            letter-spacing: -0.2px;
            font-family: 'Jua', sans-serif;
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* [🚨🚨 카드 박스 절대 고정 규칙] 단 하나의 동일한 크기 유지 */
        .app-card {
            width: 100%;
            max-width: 420px;
            height: 580px;                  /* 🚨 모든 화면 동일 */
            padding: 24px 20px;             /* 🚨 모든 화면 동일 */
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin: 0 auto;
            background: #ffffff;
            position: relative;             /* 좌상단 이전 버튼 위치 기준 */
            overflow-x: hidden;             /* 🚨 가로 스크롤 무조건 차단 */
            overflow-y: auto;               /* 🚨 세로 스크롤은 가능하되 스크롤바만 숨김 */
            scrollbar-width: none;          /* Firefox: 스크롤바 숨김 */
            -ms-overflow-style: none;       /* IE/Edge(구버전): 스크롤바 숨김 */
            display: flex;                  /* 내부 화면 정렬용 */
            flex-direction: column;
        }

        .app-card::-webkit-scrollbar {
            display: none;                  /* Chrome / Safari / Edge: 스크롤바 숨김 */
            width: 0;
            height: 0;
        }

        /* [🚨 flex 레이아웃 — 화면별 공통 베이스] */
        #start-screen, #question-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 14px;
            justify-content: flex-start;
        }

        /* 슬라이드 애니메이션용 컨테이너 */
        .slide-container {
            transition: transform 0.25s ease-in-out, opacity 0.25s ease-in-out;
        }

        /* [시작 화면 디자인] */
        .title-area {
            text-align: center;
            margin-top: 40px;
        }
        .title-area h1 {
            font-size: 28px;
            color: #333333;
            margin-bottom: 20px;
        }
        .title-area p {
            font-size: 16px;
            color: #666666;
            padding: 0 10px;
        }

        /* [질문 화면 디자인] */
        .progress-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 24px;
        }
        .progress-text {
            font-size: 14px;
            color: #888888;
            text-align: right;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: #e5e5e5;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 16.6%;
            background-color: #4a90e2;
            transition: width 0.2s ease;
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            color: #333333;
            margin-top: 10px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;                      /* 🚨 선택지가 다닥다닥 붙지 않도록 gap 필수 */
        }
        .option-card {
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e5e5e5;
            flex-shrink: 0;
            background: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .option-card input[type="radio"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        .option-card.selected {
            border-color: #4a90e2;
            background-color: #f0f7ff;
        }

        /* [이전 버튼 디자인] 카드 좌상단 화살표 */
        .prev-btn {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #e5e5e5;
            background: #ffffff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;                 /* 🚨 절대 줄어들지 않게 */
            z-index: 10;
        }

        /* [🚨 버튼 뭉개짐 방지 규칙 & 메인 버튼] */
        .main-btn {
            width: 100%;
            min-height: 52px;               /* 🚨 height 대신 min-height 사용 */
            flex-shrink: 0;                 /* 🚨 절대 줄어들지 않게 */
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;               /* 🚨 카드 하단에 자연스럽게 정착 */
            border: none;
            background-color: #4a90e2;
            color: #ffffff;
            transition: transform 0.1s;
        }
        .main-btn:hover {
            transform: translateY(-1px);    /* 🚨 미세 효과만 허용 (.app-card 영역 이탈 방지) */
            background-color: #357abd;
        }

        /* [결과 화면 디자인] */
        #result-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;                      /* 🚨 결과 화면은 좁게 조절 */
            justify-content: flex-start;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #result-screen::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
        
        .result-title {
            font-size: 22px;                /* ① 카드 상단 타이틀 22~24px */
            font-weight: 600;
            text-align: center;
            color: #333333;
            margin-top: 10px;
        }
        .type-emoji {
            font-size: 80px;                /* ② 유형 이모지: 80~100px */
            text-align: center;
            margin: 5px 0;
        }
        .type-name {
            font-size: 28px;                /* ③ 유형명: 28px bold */
            font-weight: bold;
            text-align: center;
            color: #333333;
            margin-bottom: 5px;
        }
        .style-box {
            background-color: #f0f0f0;      /* ⑤ 어떤 스타일일까: 회색 박스 */
            padding: 12px 14px;             /* padding 12px 14px 고정 */
            border-radius: 8px;
            font-size: 14px;
            color: #444444;
        }
        .place-box {
            background-color: #faf3e7;      /* ⑥ 추천 장소: 배경 #faf3e7 */
            border-left: 4px solid #d4a373; /* border-left: 4px solid #d4a373 */
            padding: 10px 14px;             /* padding 10px 14px */
            border-radius: 8px;
            font-size: 14px;
            color: #5d4037;
        }
        .keyword-box {
            display: flex;
            flex-wrap: wrap;                /* ⑦ 강점 키워드: flex-wrap */
            gap: 6px;
        }
        .keyword-chip {
            background-color: #eef2f7;      /* 배경 연한 컬러 */
            padding: 4px 10px;              /* padding 4px 10px */
            border-radius: 12px;            /* border-radius 12px */
            font-size: 13px;                /* font-size 13~14px */
            color: #4a90e2;
        }
        .suggestion-box {
            background-color: #f9fced;      /* ⑧ 💡 실천제안: 노란/연두 배경 */
            border: 1px solid #d8e2b7;       /* 테두리 포함 */
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            color: #556b2f;
        }

        footer {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-card">
        
        <button type="button" id="prev-btn" class="prev-btn" style="visibility: hidden;" onclick="goPrev()">⬅️</button>

        <div id="start-screen">
            <div class="title-area">
                <h1>🧳 나의 여행 스타일 알아보기</h1>
                <p>내가 가장 좋아하는 여행은 어떤 모습일까요? 아래의 질문에 답하고 나의 여행 스타일을 알아보아요!</p>
            </div>
            <button type="button" class="main-btn" onclick="startQuiz()">🚀 나의 여행 스타일 알아보기</button>

            </form>

            <button type="button" id="next-submit-btn" class="main-btn" onclick="goNext()">다음 질문으로 ➡️</button>
        </div>

        <div id="result-screen" style="display: none;">

            <div id="result-desc" class="style-box"></div>

            <div id="result-keywords" class="keyword-box"></div>
            
            <div id="result-suggestion" class="suggestion-box"></div>
            
            <button type="button" class="main-btn" onclick="resetQuiz()">🔄 다시 하기</button>
        </div>

    </div>

        <p style="font-size: 12px; color: gray;">AI의 도움을 받아 제작된 콘텐츠입니다.</p>

            }
        };

        // SPA 화면 제어: 시작하기
        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            currentIdx = 0;
            renderQuestion();
        }

        // 현재 인덱스에 맞춰 질문 카드를 빌드하고 렌더링하는 함수
        function renderQuestion() {
            const screen = document.getElementById('question-screen');
            // 0.25초 좌우 슬라이드 효과 느낌 유지를 위한 불투명도 리셋
            screen.style.opacity = 0;
            
            // 이전 화살표 버튼 visibility 처리 (Q1에서는 hidden)
            const prevBtn = document.getElementById('prev-btn');
            if (currentIdx === 0) {
                prevBtn.style.visibility = 'hidden';
            } else {
                prevBtn.style.visibility = 'visible';
            }

            // 상단 진행률 바 업데이트 (Q1/6 형태 및 게이지 바)
            document.getElementById('progress-text').innerText = `Q${currentIdx + 1}/6`;
            document.getElementById('progress-bar-fill').style.width = `${((currentIdx + 1) / 6) * 100}%`;

            const currentData = QUIZ_QUESTIONS[currentIdx];
            
            // [모바일 안전 세트 3] 같은 질문 라디오 버튼은 동일한 name 속성그룹 유지 및 구조화
            let html = `<div class="question-text">${currentData.q}</div><br>`;
            html += `<div class="options">`;
            currentData.options.forEach((opt, i) => {
                const isChecked = userAnswers[currentIdx] === opt.type ? 'checked' : '';
                const selectedClass = userAnswers[currentIdx] === opt.type ? 'selected' : '';
                
                html += `
                    <div class="option-card ${selectedClass}" onclick="selectOption(this, ${i}, '${opt.type}')">
                        <input type="radio" name="q_group" value="${opt.type}" ${isChecked} onclick="event.stopPropagation(); selectOption(this.parentElement, ${i}, '${opt.type}')">
                        <label style="cursor:pointer; width:100%;">${opt.text}</label>
                    </div>
                `;
            });
            html += `</div>`;

            document.getElementById('dynamic-question-area').innerHTML = html;

            // 메인 버튼 라벨 조건 매핑 반영
            const mainBtn = document.getElementById('next-submit-btn');
            if (currentIdx === 5) {
                // 🚨 마지막 질문 메인 버튼 고정 라벨 반영
                mainBtn.innerText = "📊 나의 여행 스타일 알아보기";
            } else {
                // 🚨 일반 질문 메인 버튼 고정 라벨 반영
                mainBtn.innerText = "다음 질문으로 ➡️";
            }

            setTimeout(() => {
                screen.style.opacity = 1;
            }, 50);
        }

        // 선택지 카드 클릭 시 UI 하이라이트 및 값 기록 함수
        function selectOption(cardElem, optionIdx, typeValue) {
            // 해당 그룹 안의 모든 카드를 클래스 초기화
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => c.classList.remove('selected'));
            
            // 클릭된 카드 하이라이트 및 내부 실제 라디오 체크 활성화
            cardElem.classList.add('selected');
            cardElem.querySelector('input[type="radio"]').checked = true;

            // 유저 답변 배열에 데이터 보관
            userAnswers[currentIdx] = typeValue;
        }

        // 이전 버튼 액션
        function goPrev() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        // 다음 질문 또는 결과 확인 분기 제어 함수
        function goNext() {
            // 모든 문항 응답 검사 (현재 문항 미응답 체크)
            if (!userAnswers[currentIdx]) {
                alert("답변을 선택해 주세요.");
                return;
            }

            if (currentIdx < 5) {
                currentIdx++;
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        /* [1단계 보존 — 점수 계산 및 동점 우선순위 로직 정밀 보존] */
        function calculateResult() {
            const scores = {
                "맛집 탐험형": 0,
                "감성 작가형": 0,
                "일정 마스터형": 0,
                "액티비티 러버형": 0
            };

            // 저장된 응답 가치 데이터 집계
            userAnswers.forEach(ans => {
                if(ans) scores[ans] += 1;
            });

            // 동점 시 우선순위 ①맛집 -> ②감성 -> ③일정 -> ④액티비티 순서 매핑 보존
            const priorityOrder = ["맛집 탐험형", "감성 작가형", "일정 마스터형", "액티비티 러버형"];
            let highestType = priorityOrder[0];
            let maxScore = scores[highestType];

            for (let i = 1; i < priorityOrder.length; i++) {
                const currentType = priorityOrder[i];
                if (scores[currentType] > maxScore) {
                    maxScore = scores[currentType];
                    highestType = currentType;
                }
            }

            // 결과 노출 컴포넌트 렌더링 개시
            const data = RESULT_DATA[highestType];
            
            document.getElementById('result-emoji').innerText = data.emoji; // ② 유형 이모지 문자 출력
            document.getElementById('result-name').innerText = highestType; // ③ 유형명 (28px bold)
            document.getElementById('result-desc').innerText = "어떤 스타일일까?: " + data.desc; // ⑤ 줄 전체 출력
            document.getElementById('result-places').innerText = "📍 추천 장소: " + data.places; // ⑥ 쉼표 그대로 줄 전체 출력

            // ⑦ 강점 키워드 해시태그 칩 형태 동적 빌드
            const keywordContainer = document.getElementById('result-keywords');
            keywordContainer.innerHTML = "";
            data.keywords.forEach(word => {
                const chip = document.createElement('span');
                chip.className = "keyword-chip";
                chip.innerText = "#" + word;
                keywordContainer.appendChild(chip);
            });

            // ⑧ 💡 실천제안 (라벨 준수 및 getRandomSuggestion 재호출 로직 보존)
            const randomSuggestion = getRandomSuggestion(highestType);
            document.getElementById('result-suggestion').innerText = "💡 실천제안: " + randomSuggestion;

            // SPA 화면 스위칭
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('prev-btn').style.visibility = 'hidden'; // 결과 화면에서는 상단 이전 화살표 미노출
            document.getElementById('result-screen').style.display = 'flex';
        }

        /* ⑨ [🔄 다시 하기] 버튼: reload 없이 상태값 초기화 후 첫 화면 스위칭 */
        function resetQuiz() {
            currentIdx = 0;
            userAnswers = [null, null, null, null, null, null];
            
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            
            const cardElement = document.querySelector('.app-card');
            if (cardElement) {
                cardElement.scrollTop = 0; // 카드 내부 스크롤 초기화
            }
        }
    </script>
</body>
</html>
